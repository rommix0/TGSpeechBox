# packs/lang/en-gb.yaml
# English (United Kingdom)
# Inherits from: default.yaml -> en.yaml
#
# v2.99: Enable post-processing passes that en-us has benefited from,
# tuned for RP characteristics.  Key differences from en-us:
#   - Non-rhotic (no rhotic vowel coloring, no American flapping)
#   - d͡ʒ tie-bar preserved (was being stripped → broke "edge", "judge")
#   - Slightly crisper articulation (RP enunciates more than GenAm)
#   - Conservative coarticulation (RP transitions are cleaner)
#   - Stronger pre-fortis clipping than US
#   - No single-word hold/fade (matches original Python behavior)

settings:
  # Match original Python stress timing (primaryStressDiv=1.5, secondaryStressDiv=1.2).
  # en.yaml has 1.4/1.1 which makes stressed syllables ~7% faster than original.
  primaryStressDiv: 1.5
  secondaryStressDiv: 1.2

  # Long vowels need proper duration — default 1.05 is too subtle for RP.
  lengthenedScale: 1.20

  # Keep word-final long /uː/ (do/two/you) from sounding too clipped.
  englishLongUWordFinalScale: 1.00

  # Single-word tuning: give final voiced sounds a bit of sustain
  # so word-final schwa/NURSE (/ə/ in "paper", "never") doesn't
  # cut out abruptly.  More conservative than en-us (25/15).
  singleWordFinalHoldMs: 15
  clauseFinalFadeMs: 10

  stopClosureAfterNasalsEnabled: true

  # British English: "one hundred AND twenty four"
  numberExpansion:
    conjunction: "and"

  # ── Diphthong tying ──────────────────────────────────────────────
  # eSpeak outputs PRICE/MOUTH/FACE/CHOICE as plain vowel pairs
  # without tie bars.  Enable auto-tying so the diphthong collapse
  # pass can create smooth formant sweeps instead of two choppy
  # separate tokens (which sounded Scottish/monophthongal).
  autoTieDiphthongs: true

  # RP diphthongs linger on the onset and rush the offglide.
  # Default 1.4 gives roughly 50/50 onset/offglide which makes
  # Onset hold: 1.3 gives roughly 50/50 onset/offglide balance.
  # Was 1.8, which compressed the offglide so much that GOAT/MOUTH
  # sounded like monophthongs ("bote" not "boat", "ertside" not "outside").
  diphthongOnsetHoldExponent: 1.3

  # ── Core processing passes ─────────────────────────────────────
  # These are accent-neutral improvements that benefit any English variant.

  coarticulationEnabled: true
  coarticulationVelarPinchEnabled: false
  coarticulationGraduated: false
  coarticulationAdjacencyMaxConsonants: 0
  # RP transitions are slightly cleaner than GenAm — pull back right-side
  # coarticulation from en-us's 0.7.
  coarticulationRightSideScale: 0.6
  coarticulationVelarF2LocusFront: 1800
  coarticulationVelarF2LocusBack: 1100

  segmentBoundarySkipVowelToLiquid: false

  # Speed above which high-rate intelligibility adjustments activate.
  highRateThreshold: 2.5
  highRateCoarticulationFloor: 0.35
  highRateBandwidthWideningFactor: 1.3

  trajectoryLimitEnabled: true
  microprosodyEnabled: true

  # ── Phrase-final lengthening ───────────────────────────────────
  # RP does phrase-final lengthening.  Slightly less than en-us on
  # nucleus (RP vowels are generally shorter than GenAm).
  phraseFinalLengtheningEnabled: true
  phraseFinalLengtheningNucleusOnlyMode: false
  phraseFinalLengtheningFinalSyllableScale: 1.05
  phraseFinalLengtheningNucleusScale: 1.15
  phraseFinalLengtheningNucleusDiphthongScale: 1.05
  phraseFinalLengtheningCodaScale: 1.10
  phraseFinalLengtheningCodaStopScale: 1.0
  phraseFinalLengtheningCodaFricativeScale: 1.12
  phraseFinalLengtheningCodaNasalScale: 1.20
  phraseFinalLengtheningPenultimateSyllableScale: 1.05
  phraseFinalLengtheningStatementScale: 1.0
  phraseFinalLengtheningQuestionScale: 0.85

  # ── Microprosody ───────────────────────────────────────────────
  microprosodyVoicelessF0RaiseEnabled: false
  microprosodyVoicelessF0RaiseHz: 12.0
  microprosodyVoicedF0LowerEnabled: true
  microprosodyVoicedF0LowerHz: 4.0
  microprosodyVoicedFricativeLowerScale: 0.5
  microprosodyFollowingF0Enabled: true
  microprosodyFollowingVoicelessRaiseHz: 3.0
  microprosodyFollowingVoicedLowerHz: 2.0
  microprosodyIntrinsicF0Enabled: true
  microprosodyIntrinsicF0HighThreshold: 400.0
  microprosodyIntrinsicF0LowThreshold: 600.0
  microprosodyIntrinsicF0HighRaiseHz: 3.0
  microprosodyIntrinsicF0LowDropHz: 2.0

  # Pre-voiceless shortening: RP has pre-fortis clipping but the vowel
  # needs enough duration for a clean vowel→stop boundary.
  microprosodyPreVoicelessShortenEnabled: true
  microprosodyPreVoicelessShortenScale: 0.85
  microprosodyPreVoicelessMinMs: 40.0
  microprosodyVoicelessCodaLengthenEnabled: true
  microprosodyVoicelessCodaLengthenScale: 1.20
  microprosodyMaxTotalDeltaHz: 10.0

  rateReductionEnabled: false
  nasalizationAnticipatoryEnabled: false

  # ── Prominence ─────────────────────────────────────────────────
  prominence:
    enabled: true
    primaryStressWeight: 1.45
    secondaryStressWeight: 1.20
    longVowelWeight: 0.0
    longVowelMode: "never"
    wordInitialBoost: 0.05
    wordFinalReduction: 0.05

    durationProminentFloorMs: 55
    durationPrimaryFloorMs: 95
    durationReducedCeiling: 0.85

    monosyllableFloor: 0.9

    # Function words — UK vowel variants (RP uses /ɒ/ for LOT, no rhoticity).
    monosyllableExclude:
      - "ðə"      # the
      - "ðɪ"      # the (prevocalic)
      - "ə"       # a
      - "ən"      # an
      - "ɒv"      # of
      - "əv"      # of (reduced)
      - "tə"      # to
      - "tuː"     # to (strong)
      - "fə"      # for (reduced)
      - "fɔː"     # for
      - "ɪn"      # in
      - "ɒn"      # on
      - "æt"      # at
      - "ɪz"      # is
      - "ɪt"      # it
      - "wɒz"     # was
      - "hæz"     # has
      - "hæd"     # had
      - "bʌt"     # but
      - "ɔː"      # or
      - "æz"      # as
      - "ænd"     # and
      - "ənd"     # and (reduced)
      - "nɒt"     # not
      - "ðæt"     # that (conjunction)

    fullVowelFloor: 0.4
    amplitudeBoostDb: 0.3
    amplitudeReductionDb: 0.0
    pitchFromProminence: true

  # ── Liquid dynamics ────────────────────────────────────────────
  liquidDynamics:
    enabled: true
    rhoticF3Dip:
      enabled: false   # Non-rhotic — no American R coloring

  # ── Diphthong collapse ─────────────────────────────────────────
  diphthongCollapse:
    enabled: true
    durationScale: 1.0
    pairScales:
      "a j": 1.20         # PRICE — wide (offglide is semivowel in RP)
      "å w": 1.30          # MOUTH — wide (å = RP open back onset)
      "ɔ j": 1.15          # CHOICE — wide
      "e j": 0.95          # FACE — narrow
      "ə w": 0.75          # GOAT — minimal glide; unstressed RP GOAT is near-monophthong
    durationFloorMs: 60
    onsetHoldExponent: 1.3
    microFrameIntervalMs: 8

  lengthContrast:
    enabled: false

  # ── Allophone rules ────────────────────────────────────────────
  allophoneRules:
    enabled: true
    rules:
    # ── /l/ darkness by position ─────────────────────────────────
    # RP has strong dark-l in coda.  Slightly stronger than US values.
      - name: dark_l_post_vocalic
        phonemes: [l, ɫ]
        position: post-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.85
          - field: pf2
            targetHz: 900.0
            blend: 0.85

      - name: dark_l_syllabic
        phonemes: [l, ɫ]
        position: syllabic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.9
          - field: pf2
            targetHz: 900.0
            blend: 0.9

      - name: light_l_pre_vocalic
        phonemes: [l, ɫ]
        position: pre-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.2
          - field: pf2
            targetHz: 900.0
            blend: 0.2

    # ── Post-sibilant aspiration suppression ─────────────────────
    # "style" vs "tile", "spin" vs "pin", "skin" vs "kin".
      - name: post_sibilant_aspiration_suppress
        tokenType: aspiration
        after: ["s", "ʃ"]
        action: scale
        durationScale: 0.05
        fieldScales:
          aspirationAmplitude: 0.05
          fricationAmplitude: 0.05

    # ── Voiceless stop burst rebalance ─────────────────────────────
    # Base phonemes have very high frication relative to burst energy:
    #   /t/ fricationAmplitude=0.92 vs /t͡ʃ/ fricationAmplitude=0.88
    #   /p/ fricationAmplitude=0.75 vs /f/  fricationAmplitude=1.00
    # This makes stops sound fricative-like (/t/→"ch", /p/→"f").
    # Fix: cut frication, boost burst transient + aspiration to widen
    # the perceptual gap between stops and their fricative confusors.
    # Applies to all voiceless stops in all positions.
      - name: voiceless_stop_burst_boost
        flags: [stop]
        notFlags: [voiced]
        action: scale
        fieldScales:
          fricationAmplitude: 0.82
          aspirationAmplitude: 1.35
          pa1: 1.25
          pa2: 1.20

    # ── Voiced stop burst clarity (place-specific) ──────────────
    # Voiced stops have weak bursts because voicing masks the transient.
    # RP articulates more crisply than GenAm.  Boost the spectral region
    # that carries place identity: labial=low (pa1/pa2), alveolar=mid-high
    # (pa3/pa4), velar=compact mid (pa2/pa3).
      - name: voiced_labial_burst_boost
        flags: [stop, voiced]
        place: labial
        action: scale
        fieldScales:
          fricationAmplitude: 1.25
          pa1: 1.40
          pa2: 1.35

      - name: voiced_alveolar_burst_boost
        flags: [stop, voiced]
        place: alveolar
        action: scale
        fieldScales:
          fricationAmplitude: 1.15
          pa3: 1.35
          pa4: 1.25

      - name: voiced_velar_burst_boost
        flags: [stop, voiced]
        place: velar
        action: scale
        fieldScales:
          fricationAmplitude: 1.20
          pa2: 1.30
          pa3: 1.25

    # ── Pre-stop unreleased (first stop in cluster) ──────────────
    # In natural speech the first stop in a cluster like /kt/ ("locked"),
    # /pt/ ("kept"), /gd/ ("bagged") is unreleased — the vocal tract
    # moves directly from one closure to the next without an audible
    # burst (Ladefoged & Maddieson 1996).  Only the LAST stop gets
    # released.  Without this, both stops fire full bursts and merge
    # into one big click that's hard to parse as two consonants.
      - name: stop_before_stop_unreleased
        flags: [stop]
        beforeFlags: [stop]
        action: scale
        fieldScales:
          fricationAmplitude: 0.12
          aspirationAmplitude: 0.08

    # ── Unreleased word-final stops ──────────────────────────────
    # RP often has unreleased or glottalized final stops.  Slightly
    # more aggressive than US — RP speakers release finals less.
    #
    # FIXED: Old rule kept frication at ×0.80 (barely touched) while
    # crushing the burst AND tilting it upward (pa4×1.3, pa5×1.4)
    # into the sibilant frequency range — literally reshaping /t/
    # toward /t͡ʃ/.  New rule cuts frication harder, preserves more
    # burst in the stop-appropriate spectral region, and removes
    # the upward tilt that was bleeding into affricate territory.
      - name: unreleased_word_final
        flags: [stop]
        notFlags: [voiced]
        notAfterFlags: [stop]
        position: word-final
        action: scale
        durationScale: 0.80
        fieldScales:
          fricationAmplitude: 0.55
          aspirationAmplitude: 0.60
          pa1: 0.40
          pa2: 0.55
          pa3: 0.60
          pa4: 0.50
          pa5: 0.40
          pa6: 0.30

    # ── Velar word-final boost ─────────────────────────────────────
    # Velar stops have "compact" burst energy in mid-frequencies.
    # The general unreleased_word_final rule makes /k/ too quiet
    # in words like "rock", "back".  Boost mid-range burst and
    # aspiration to restore presence.
      - name: velar_word_final_boost
        flags: [stop]
        notFlags: [voiced]
        place: velar
        position: word-final
        action: scale
        fieldScales:
          aspirationAmplitude: 1.40
          pa2: 1.35
          pa3: 1.30

    # ── Labial word-final boost ────────────────────────────────────
    # Labial stops (/p/) have weaker bursts than alveolars or velars
    # because the lip seal radiates less high-frequency energy.
    # The general unreleased_word_final rule cuts them too hard,
    # making /p/ in "sharp", "wrap", "help" nearly inaudible.
      - name: labial_word_final_boost
        flags: [stop]
        notFlags: [voiced]
        place: labial
        position: word-final
        action: scale
        fieldScales:
          aspirationAmplitude: 2.50
          fricationAmplitude: 2.00
          pa1: 2.80
          pa2: 2.20
          pa3: 1.80

    # ── Voiced alveolar word-final softening ─────────────────────────
    # Word-final /d/ pops too bright with the diffuse-rising burst.
    # Soften high-frequency components so it blends into the vowel.
      - name: voiced_alveolar_word_final_soften
        flags: [stop, voiced]
        place: alveolar
        position: word-final
        action: scale
        fieldScales:
          fricationAmplitude: 0.55
          pa4: 0.65
          pa5: 0.50
          pa6: 0.40

    # ── Post-nasal /d/ burst softening ──────────────────────────────
    # /nd/ clusters ("calendar", "understand") sound affricated on small
    # speakers because nasal release adds frication energy.  Roll off
    # upper burst components so /d/ stays clean.
      - name: post_nasal_d_soften
        phonemes: ["d"]
        afterFlags: [nasal]
        action: scale
        fieldScales:
          pa5: 0.50
          pa6: 0.35
          fricationAmplitude: 0.70

    # NOTE: No American flapping rule — RP preserves /t/ and /d/
    # in intervocalic position ("water" = /wɔːtə/, not /wɔːɾɚ/).

  # ── Boundary smoothing ─────────────────────────────────────────
  # RP articulation is crisper, so slightly shorter fades than en-us.
  boundarySmoothing:
    enabled: true
    f1Scale: 0.50
    f2Scale: 0.50
    f3Scale: 0.80

    nasalF1Instant: true
    nasalF2F3SpansPhone: true

    liquidToVowelFadeMs: 18
    vowelToLiquidFadeMs: 16
    stopToVowelFadeMs: 18
    vowelToStopFadeMs: 22
    fricToVowelFadeMs: 16
    vowelToFricFadeMs: 16
    nasalToVowelFadeMs: 14
    vowelToNasalFadeMs: 14
    nasalToStopFadeMs: 10
    liquidToStopFadeMs: 10
    fricToStopFadeMs: 8
    stopToFricFadeMs: 12
    vowelToVowelFadeMs: 18

    highRateFadeRatioFloor: 0.40

    # Per-place transition speeds — same physics, slightly crisper.
    labialF1Scale: 0.30
    labialF2Scale: 0.55
    labialF3Scale: 0.55
    alveolarF1Scale: 0.38
    alveolarF2Scale: 0.48
    alveolarF3Scale: 0.60
    palatalF1Scale: 0.33
    palatalF2Scale: 0.50
    palatalF3Scale: 0.70
    velarF1Scale: 0.33
    velarF2Scale: 0.60
    velarF3Scale: 0.55

  # ── Trajectory limiting ────────────────────────────────────────
  trajectoryLimit:
    enabled: true
    applyAcrossWordBoundary: true
    windowMs: 25
    liquidRateScale: 1.5
    applyTo: [cf2, cf3, pf2, pf3]
    maxHzPerMs:
      cf2: 26
      cf3: 22
      pf2: 18
      pf3: 22

  # ── Special coarticulation ─────────────────────────────────────
  # No rhotic vowel coloring (non-rhotic).  Yod fronting for RP.
  specialCoarticulation:
    enabled: true
    maxDeltaHz: 350
    rules:
      - name: labial-f2-lowering
        triggers: ["w", "b", "p", "m"]
        vowelFilter: all
        formant: f2
        deltaHz: -40
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: alveolar-back-vowel-fronting
        triggers: ["t", "d", "n", "s", "z"]
        vowelFilter: back
        formant: f2
        deltaHz: 55
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: palatal-f2-raising
        triggers: ["j"]
        vowelFilter: all
        formant: f2
        deltaHz: 70
        side: right
        cumulative: false
        unstressedScale: 0.4

      - name: pre-velar-f2-raise
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f2
        deltaHz: 80
        side: right
        cumulative: false
        unstressedScale: 0.7

      - name: pre-velar-f3-lower
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f3
        deltaHz: -100
        side: right
        cumulative: false
        unstressedScale: 0.7

  # ── Cluster timing ─────────────────────────────────────────────
  # RP keeps clusters a bit more distinct than GenAm (closer to 1.0).
  clusterTiming:
    enabled: true
    fricBeforeStopScale: 0.75
    stopBeforeFricScale: 0.80
    fricBeforeFricScale: 0.80
    stopBeforeStopScale: 0.70
    tripleClusterMiddleScale: 0.65
    affricateInClusterScale: 0.80
    wordMedialConsonantScale: 0.90
    wordFinalObstruentScale: 0.95

  # ── Cluster blend ──────────────────────────────────────────────
  clusterBlend:
    enabled: true
    forwardDriftStrength: 0.25

  # ── Rate compensation ──────────────────────────────────────────
  rateCompensation:
    enabled: true
    minimumDurations:
      vowelMs: 20
      fricativeMs: 18
      stopMs: 4
      nasalMs: 18
      liquidMs: 15
      affricateMs: 12
      semivowelMs: 30
      tapMs: 4
      trillMs: 12
      voicedConsonantMs: 10
    wordFinalBonusMs: 5
    floorSpeedScale: 0.0
    clusterProportionGuard: true
    clusterMaxRatioShift: 0.4
    sonorantContextBonusMs: 8
    schwaReduction:
      enabled: false
      threshold: 2.5
      scale: 0.8

  sonorantContextAmplitudeScale: 1.15

  # ── Syllable duration ──────────────────────────────────────────
  syllableDuration:
    enabled: true
    onsetScale: 1.10
    codaScale: 0.85
    unstressedOpenNucleusScale: 0.90

  # ── Syllable structure (legal onsets for text parser) ──────────
  syllableStructure:
    legalOnsets:
      - pl
      - pɹ
      - bl
      - bɹ
      - tɹ
      - tw
      - dɹ
      - dw
      - kl
      - kɹ
      - kw
      - ɡl
      - ɡɹ
      - ɡw
      - fl
      - fɹ
      - fj
      - θɹ
      - sl
      - sm
      - sn
      - sp
      - st
      - sk
      - sw
      - ʃɹ
      - vj
      - hj
      - bj
      - pj
      - pw
      - kj
      - tj
      - dj
      - mj
      - nj
      - lj
      - spl
      - spɹ
      - stɹ
      - skɹ
      - skw
      - skl
      - spj
      - stj
      - skj

  legacyPitchMode: espeak_style
  legacyPitchInflectionScale: 0.56

normalization:
  # en.yaml opens FOOT ʊ→ʊ̞ for US/AU accents.  RP FOOT is closer
  # to cardinal [ʊ], so skip the inherited rule.  (The old
  # preReplacements ʊ̞→ʊ was a no-op because preReplacements run
  # before the replacement that creates ʊ̞.)
  skipReplacements:
    - from: "ʊ"
      to:   "ʊ̞"

  preReplacements:
    # Non-rhotic: drop post-vocalic /ɹ/ FIRST, before vowel sequence
    # collapse rules run (e.g. iə → iᵊ needs ɹ gone to see word-end).
    - from: "ɹ"
      to:   ""
      when:
        afterClass: VOWELISH
        atWordEnd: true
    - from: "ɹ"
      to:   ""
      when:
        afterClass: VOWELISH
        beforeClass: CONSONANTS
    - from: "r"
      to:   ""
      when:
        afterClass: VOWELISH
        atWordEnd: true
    - from: "r"
      to:   ""
      when:
        afterClass: VOWELISH
        beforeClass: CONSONANTS

    # RP MOUTH onset: å (F1=770, F2=1230) — fully open, back-of-center.
    # Hawkins & Midgley (2005): modern RP MOUTH F1≈770, F2≈1200-1300.
    # Default 'a' (F1=600, F2=1430) is too closed and fronted — sounds
    # like lips aren't fully open ("haou" instead of "how").
    - from: "a͡ʊ"
      to:   "å͡ʊ"

  classes:
    BATH_FOLLOW: ["s", "f", "θ"]

    VOWELISH:
      - "0"
      - "3"
      - "@"
      - "E"
      - "I"
      - "O"
      - "U"
      - "V"
      - "a"
      - "e"
      - "i"
      - "o"
      - "oː"
      - "u"
      - "y"
      - "yː"
      - "Ã"
      - "á"
      - "ã"
      - "æ"
      - "é"
      - "í"
      - "ó"
      - "õ"
      - "ø"
      - "øː"
      - "ú"
      - "ĩ"
      - "ő"
      - "œ"
      - "ũ"
      - "ű"
      - "ɐ"
      - "ɑ"
      - "ɑj"
      - "ɑw"
      - "ɑ̃"
      - "ɒ"
      - "ɔ"
      - "ɔ_r"
      - "ɔj"
      - "ɘ"
      - "ə"
      - "ə͡l"
      - "ɚ"
      - "ɛ"
      - "ɜ"
      - "ɝ"
      - "ɤ"
      - "ɨ"
      - "ɪ"
      - "ɯ"
      - "ɵ"
      - "ʉ"
      - "ʊ"
      - "ʊ̞"
      - "ʌ"
      - "ʏ"
      - "ᴀ"
      - "ᴇ"
      - "ᴏ"
      - "ᴐ"
      - "ᴒ"
      - "ᴜ"
      - "ᵁ"
      - "ᵃ"
      - "ᵒ"
      - "ᵻ"
      - "ᵾ"
      - "ᵿ"
      - "ẽ"
      - "ᵊ"
      - "ᵊᵉ"

    CONSONANTS:
      - "?"
      - "b"
      - "c"
      - "d"
      - "d͡z"
      - "d͡ʐ"
      - "d͡ʑ"
      - "d͡ʒ"
      - "f"
      - "g"
      - "h"
      - "j"
      - "k"
      - "l"
      - "m"
      - "n"
      - "p"
      - "r"
      - "s"
      - "t"
      - "t(3"
      - "t͡s"
      - "t͡ɕ"
      - "t͡ʂ"
      - "t͡ʃ"
      - "v"
      - "w"
      - "x"
      - "z"
      - "ç"
      - "ð"
      - "ŋ"
      - "ɕ"
      - "ɟ"
      - "ɟʲ"
      - "ɡ"
      - "ɣ"
      - "ɧ"
