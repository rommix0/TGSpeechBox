# Spanish.

settings:
  primaryStressDiv: 1.25
  secondaryStressDiv: 1.07

  # Stop closure - use "always" for Spanish to ensure clear consonants
  # and prevent final taps from being swallowed (e.g. "abrir paréntesis").
  # Increased gaps for better consonant separation.
  stopClosureMode: always
  stopClosureVowelGapMs: 30
  stopClosureVowelFadeMs: 6
  stopClosureClusterGapMs: 30
  stopClosureClusterFadeMs: 5
  stopClosureWordBoundaryClusterGapMs: 36
  stopClosureWordBoundaryClusterFadeMs: 5
  
  segmentBoundaryGapMs: 20
  segmentBoundaryFadeMs: 6

  # Boundary smoothing disabled - we want crisp consonants
  boundarySmoothing:
    enabled: false

  # Trill modulation (rolled R). Applied only when the phoneme has _isTrill: true.
  trillModulationMs: 52
  trillModulationFadeMs: 2

  # Single-word utterance smoothing (key echo / word-by-word navigation)
  singleWordTuningEnabled: true
  singleWordFinalHoldMs: 35
  singleWordFinalFadeMs: 18
  singleWordClauseTypeOverride: "."
  singleWordClauseTypeOverrideCommaOnly: true

# Spanish pure vowels - monophthongs without English-style diphthongization.
# These override the base phonemes.yaml values for Spanish.
  spellingDiphthongMode: none
  stopClosureAfterNasalsEnabled: false
  segmentBoundarySkipVowelToLiquid: false
  postStopAspirationEnabled: false
  coarticulationEnabled: false
  coarticulationFadeIntoConsonants: false
  coarticulationVelarPinchEnabled: false
  coarticulationGraduated: false
  coarticulationAdjacencyMaxConsonants: 2
  phraseFinalLengtheningEnabled: false
  phraseFinalLengtheningNucleusOnlyMode: false
  microprosodyEnabled: false
  microprosodyVoicelessF0RaiseEnabled: false
  microprosodyVoicedF0LowerEnabled: false
  rateReductionEnabled: false
  nasalizationAnticipatoryEnabled: false
  liquidDynamics:
    enabled: false
  lengthContrast:
    enabled: false
  allophoneRulesEnabled: true
  allophoneRules:
    enabled: false
    glottalReinforcement:
      enabled: false
  trajectoryLimit:
    enabled: false
    applyAcrossWordBoundary: false
  legacyPitchMode: espeak_style

normalization:
  classes:
    # Let's define vowels for further pronounciation exceptions.
    VOWELS:
      - a
      - e
      - i
      - o
      - u

    # This is needed to smoot wors like 'convencer', which are phonetically transcribed into /m/ and /b/ coda.
    # And soften /d/ (andar)
    NASAL:
      - m
      - n
    # Let's define stop consonants, to fix Espeak diphthong mistakes in Spanish.
    # Patria is transcribed phonetically to "pˈatɾia".
    STOPS:
      - "β"
      - "ð"
      - k
      - d
      - f
      - "ɣ"
      - p
      - t

  replacements:
    # Pronounciation-level normalization rules:
    # Palatal nasal: some tables emit ñ as nʲ (or n͡ʲ). Map it to /ɲ/ so it doesn't collapse to plain /n/.
    - from: "n͡ʲ"
      to: "ɲ"
    - from: "nʲ"
      to: "ɲ"
    - from: "ɲʲ"
      to: "ɲ"
    # eSpeak Spanish often emits "ʝ" for initial <y>/<ll> (e.g. "yo").
    # We have a dedicated ʝ phoneme; keep it.
    # If a voice uses the affricate ɟʝ, collapse it to ʝ to avoid an overly "hard" onset.
    - from: "ɟʝ"
      to: "ʝ"
    # Specific replacements
    # Make ñ a bit longer, so "mañana" could sound a bit better, and can be distinguished from n.
    # Rate compensation isn't ideal, we'll need to lengthen it even on normal speed.
    - from: "ɲ"
      to: "ɲɲ"
    # Smoot /b/ to /β/ in the following cases: before m, and when it is located at the end to avoid strange glitches.
    - from: b
      to: "β"
      when:
        afterClass: NASAL
    - from: b
      to: "β"
      when:
        atWordEnd: true
    # Also smooting /d/ in words like 'velocidad':
    - from: d
      to: "ð"
      when:
        atWordEnd: true
    # G approximant. To improve clarity, let's convert into non-aproximant g at the start, example: muy grande.
    - from: "ɣ"
      to: "ɡ"
      when:
        atWordStart: true
    # Intervocalic tap: insert micro-schwa to give the tap room
    # between vowels (e.g. "para" → "paᵊɾa").
    # Requires vowel both before AND after — prevents nasal-like
    # murmur at word-final position ("trabajador" stays clean).
    - from: "ɾ"
      to: "ᵊɾ"
      when:
        afterClass: VOWELS
        beforeClass: VOWELS
    # Word-final tap for r: use ɾ_wf allophone which has fricationAmplitude
    # for a tongue-flick release and raised F2 to distinguish from /n/.
    # Without this, utterance-final taps sound nasal ("perdén", "amón").
    # Only trill when next word starts with a consonant or at end of phrase.
    # Before vowels ("buscar esto"), the tap links smoothly — no trill (#42).
    - from: "ɾ"
      to: "ɾ_wfᵊɾ_wf"
      when:
        atWordEnd: true
        nextWordStartsNotClass: VOWELS
    # ===== Espeak =====
    # Section 1: fix espeak's pronounciation mistakes like 'prueba', when 'u' is preceded by a stressed vowel. That always should be 'w', diphthong.
    - from: "uˈ"
      to: "wˈ"
      when:
        beforeClass: VOWELS
    # Section 2: i > j. 
    # stop + L, r, current replacement, then a vowel.
    # We can replace "amplia" (p+l = cluster, i>j = fixed diphthong, a = needed), but not "amplificar". After the "pl" cluster, there is not a diphthong, so we'll need to be careful here.
    # L: Amplia:
    - from: "li"
      to: "lj"
      when:
        afterClass: STOPS
        beforeClass: VOWELS
    - from: "lu"
      to: "lw"
      when:
        afterClass: STOPS
        beforeClass: VOWELS
    # r: Patria:
    - from: "ɾi"
      to: "ɾj"
      when:
        afterClass: STOPS
        beforeClass: VOWELS
    - from: "ɾu"
      to: "ɾw"
      when:
        afterClass: STOPS
        beforeClass: VOWELS
    # ===== End Espeak =====
    # Separate consonant clusters so they don't blend together.
    # Insert a micro-schwa to give each consonant space.
    # ɾ+approximant clusters (e.g. "verde" = ɾð, "largo" = ɾɣ)
    - from: "ɾð"
      to: "ɾᵊð"
    - from: "ɾɣ"
      to: "ɾᵊɣ"
    - from: "ɾβ"
      to: "ɾᵊβ"
    - from: "ɾθ"
      to: "ɾᵊθ"
    - from: "ɾf"
      to: "ɾᵊf"
    - from: "ɾx"
      to: "ɾᵊx"
    - from: "ɾk"
      to: "ɾᵊk"
    - from: "ɾl"
      to: "ɾᵊl"
    - from: "ɾm"
      to: "ɾᵊm"
    - from: "ɾn"
      to: "ɾᵊn"
    - from: "ɾp"
      to: "ɾᵊp"
    - from: "ɾs"
      to: "ɾᵊs_es"
    # Todo: I don't know why this doesn't work. Proper r with micro schwa for words like "archivo"
    - from: "ɾt͡ʃ"
      to: "ɾᵊt͡ʃ_es"
    - from: "ɾt"
      to: "ɾᵊt"
    # Approximant/stop + ɾ clusters (e.g. "madre" = ðɾ, "abrir" = βɾ)
    - from: "bɾ"
      to: "bᵊɾ"
    - from: "βɾ"
      to: "βᵊɾ"
    - from: "ðɾ"
      to: "ðᵊɾ"
    - from: "fɾ"
      to: "fᵊɾ"
    - from: "ɡɾ"
      to: "ɡᵊɾ"
    - from: "ɣɾ"
      to: "ɣᵊɾ"
    - from: "kɾ"
      to: "kᵊɾ"
    - from: "pɾ"
      to: "pᵊɾ"
    # Custom phoneme tune replacements.
    # Make vowels more central:
    - from: a
      to: a_es
    # Openned e. It is already tuned in phonemes.yaml.
    # Todo: a way to consider a kind of sorted replacements. We replace e to e_es, but now ɛ to e.
    - from: "ɛ"
      to: e
    # Regular e:
    - from: e
      to: e_es
    - from: o
      to: o_es
    - from: u
      to: u_es
    # Spanish dental approximant - much less frication than English "the".
    - from: "ð"
      to: "ð_es"
    # A slightly softened and less noisy /d/.
    - from: d
      to: d_es
    # A softed g approximant. It is neutral, dialect independent, but this may change in the future.
    - from: "ɣ"
      to: ɣ_es
    # More clear diphthong transition for /j/.
    - from: j
      to: j_es
    # In Spanish, ɪ is a semivowel, part of the glides.
    - from: "ɪ"
      to: "ɪ_es"
    # Yeísmo (neutral):
    - from: "ʎ"
      to: "ʎ_es"
    # Proper sound for l:
    - from: l
      to: l_es
    # More reflection of nasals:
    - from: m
      to: m_es
    - from: n
      to: n_es
    # Castilian sound for /x/.
    - from: x
      to: x_es
    # A temporal workaround to get a /s/ sound with more brightness:
    - from: s
      to: s_es
    # Make ch more clear:
    - from: "t͡ʃ"
      to: "t͡ʃ_es"
    - from: "tɾ"
      to: "tᵊɾ"
    # Separate sonorant/fricative + velar clusters so the preceding
    # consonant isn't swallowed by the velar burst.
    # Reported: "algo", "carga", "rasgar", "regla" sound unclear.
    - from: "lɡ"
      to: "lᵊɡ"
    - from: "lɣ"
      to: "lᵊɣ"
    - from: "ɾɡ"
      to: "ɾᵊɡ"
    - from: "ɾɣ"
      to: "ɾᵊɣ"
    - from: "sɡ"
      to: "sᵊɡ"
    - from: "sɣ"
      to: "sᵊɣ"
    # Velar + lateral (regla = /reɣla/)
    - from: "ɣl"
      to: "ɣᵊl"
    - from: "ɡl"
      to: "ɡᵊl"
    # Set our own r trill r. The default one lacks naturalness.
    - from: "r"
      to: "ɾᵊɾ"
