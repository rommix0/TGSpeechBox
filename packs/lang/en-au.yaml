# packs/lang/en-au.yaml
# English (Australian) — General Australian accent
# Inherits from: default.yaml → en.yaml
#
# Key characteristics of Australian English:
#   - Non-rhotic (like RP, unlike GenAm) — no post-vocalic /ɹ/
#   - BATH = TRAP (unlike RP which broadens to /ɑː/) — "dance" rhymes with "ants"
#   - Fronted START/PALM vowel — base ɑ (F2≈1330) not RP's back ᵅ (F2≈1200)
#   - Centralized KIT — theoretically [ɘ]-ish, but disabled (ü artifact in formant synth)
#   - Raised DRESS — [e] not RP [ɛ], needs dedicated ᵉ phoneme (F2≈1950)
#   - Fronted STRUT — [ɐ] rather than RP/GenAm [ʌ]
#   - Lowered FACE onset — [æɪ] rather than RP [eɪ]
#   - Very fronted GOOSE — [ʉ̟ː], needs dedicated ᵘ phoneme (F2≈1700)
#   - Intervocalic flapping (like GenAm, unlike RP) — "water" = [woːɾə]
#   - GOAT diphthong already close to target with əʊ from eSpeak
#   - THOUGHT stays as [ɔː] (similar to RP)
#   - happY vowel leans toward [ɪ] rather than tense [i]
#   - NEAR/SQUARE non-rhotic with schwa offglides
#   - Moderate dark-L in codas

settings:
  # ── Stop closures ──────────────────────────────────────────────
  stopClosureMode: vowel-and-cluster
  stopClosureClusterGapsEnabled: true
  stopClosureAfterNasalsEnabled: true

  stopClosureVowelGapMs: 18
  stopClosureVowelFadeMs: 4
  stopClosureClusterGapMs: 20
  stopClosureClusterFadeMs: 14
  stopClosureWordBoundaryClusterGapMs: 22
  stopClosureWordBoundaryClusterFadeMs: 4

  # ── Utterance edges ────────────────────────────────────────────
  singleWordFinalFadeMs: 20
  clauseFinalFadeMs: 12

  postStopAspirationEnabled: true

  # ── Length marks ───────────────────────────────────────────────
  # Australian vowel length contrasts are moderate — between RP
  # (which is stricter) and GenAm (which compresses length more).
  lengthenedVowelFinalCodaScale: 0.80
  applyLengthenedScaleToVowelsOnly: false
  lengthenedScale: 1.20

  # ── GOOSE fronting ─────────────────────────────────────────────
  # Australian GOOSE is heavily fronted [ʉː].
  # en.yaml maps u→ᵾ; our replacement ᵾ→ʉ then fronts it further.
  englishLongUShortenEnabled: true
  englishLongUWordFinalScale: 0.95

  # ── Diphthongs ─────────────────────────────────────────────────
  spellingDiphthongMode: monophthong
  autoTieDiphthongs: true
  autoDiphthongOffglideToSemivowel: false
  semivowelOffglideScale: 0.65

  # ── Coarticulation ─────────────────────────────────────────────
  # Australian articulation sits between RP crispness and GenAm smoothness.
  coarticulationEnabled: true
  trajectoryLimitEnabled: true
  microprosodyEnabled: true
  segmentBoundarySkipVowelToLiquid: false
  coarticulationVelarPinchEnabled: false
  coarticulationGraduated: false
  coarticulationAdjacencyMaxConsonants: 0
  coarticulationRightSideScale: 0.65
  coarticulationVelarF2LocusFront: 1800
  coarticulationVelarF2LocusBack: 1100

  # ── High-rate intelligibility ──────────────────────────────────
  highRateThreshold: 2.5
  highRateCoarticulationFloor: 0.35
  highRateBandwidthWideningFactor: 1.3

  # ── Phrase-final lengthening ───────────────────────────────────
  # Australian English lengthens phrase-finals moderately.
  phraseFinalLengtheningEnabled: true
  phraseFinalLengtheningNucleusOnlyMode: false
  phraseFinalLengtheningFinalSyllableScale: 1.05
  phraseFinalLengtheningNucleusScale: 1.18
  phraseFinalLengtheningNucleusDiphthongScale: 1.06
  phraseFinalLengtheningCodaScale: 1.08
  phraseFinalLengtheningCodaStopScale: 1.0
  phraseFinalLengtheningCodaFricativeScale: 1.12
  phraseFinalLengtheningCodaNasalScale: 1.22
  phraseFinalLengtheningPenultimateSyllableScale: 1.06
  phraseFinalLengtheningStatementScale: 1.0
  phraseFinalLengtheningQuestionScale: 0.88

  # ── Microprosody ───────────────────────────────────────────────
  microprosodyVoicelessF0RaiseEnabled: false
  microprosodyVoicelessF0RaiseHz: 12.0
  microprosodyVoicedF0LowerEnabled: true
  microprosodyVoicedF0LowerHz: 4.0
  microprosodyVoicedFricativeLowerScale: 0.5
  microprosodyFollowingF0Enabled: true
  microprosodyFollowingVoicelessRaiseHz: 3.0
  microprosodyFollowingVoicedLowerHz: 2.0
  microprosodyIntrinsicF0Enabled: true
  microprosodyIntrinsicF0HighThreshold: 400.0
  microprosodyIntrinsicF0LowThreshold: 600.0
  microprosodyIntrinsicF0HighRaiseHz: 3.0
  microprosodyIntrinsicF0LowDropHz: 2.0

  # Pre-voiceless shortening: moderate — between RP's strong
  # pre-fortis clipping and GenAm's gentler contrast.
  microprosodyPreVoicelessShortenEnabled: true
  microprosodyPreVoicelessShortenScale: 0.79
  microprosodyPreVoicelessMinMs: 35.0
  microprosodyVoicelessCodaLengthenEnabled: true
  microprosodyVoicelessCodaLengthenScale: 1.18
  microprosodyMaxTotalDeltaHz: 10.0

  rateReductionEnabled: false
  nasalizationAnticipatoryEnabled: false

  # ── Prominence ─────────────────────────────────────────────────
  prominence:
    enabled: true
    primaryStressWeight: 1.45
    secondaryStressWeight: 1.18
    longVowelWeight: 0.0
    longVowelMode: "never"
    wordInitialBoost: 0.05
    wordFinalReduction: 0.05

    durationProminentFloorMs: 55
    durationPrimaryFloorMs: 95
    durationReducedCeiling: 0.85

    monosyllableFloor: 0.9

    # Function words — Australian IPA forms (non-rhotic, fronted STRUT,
    # centralized KIT).  Include both pre- and post-normalization forms
    # since baseChar matching depends on the final phoneme key.
    monosyllableExclude:
      - "ðə"      # the
      - "ðɪ"      # the (prevocalic)
      - "ə"       # a
      - "ən"      # an
      - "ɒv"      # of
      - "əv"      # of (reduced)
      - "tə"      # to
      - "tuː"     # to (strong)
      - "fə"      # for (reduced)
      - "fɔː"     # for
      - "ɪn"      # in
      - "ɒn"      # on
      - "æt"      # at
      - "ɪz"      # is
      - "ɪt"      # it
      - "wɒz"     # was
      - "hæz"     # has
      - "hæd"     # had
      - "bʌt"     # but (pre-normalization)
      - "bɐt"     # but (post STRUT fronting)
      - "ɔː"      # or
      - "æz"      # as
      - "ænd"     # and
      - "ənd"     # and (reduced)
      - "nɒt"     # not
      - "ðæt"     # that (conjunction)

    fullVowelFloor: 0.4
    amplitudeBoostDb: 0.3
    amplitudeReductionDb: 0.0
    pitchFromProminence: true

  # ── Liquid dynamics ────────────────────────────────────────────
  liquidDynamics:
    enabled: true
    rhoticF3Dip:
      enabled: false   # Non-rhotic — no American-style R vowel coloring

  # ── Diphthong collapse ─────────────────────────────────────────
  diphthongCollapse:
    enabled: true
    durationScale: 1.0
    pairScales:
      "ɑ ɪ": 1.20         # PRICE — wide
      "ɑ ʊ": 1.15          # MOUTH — wide
      "ɔ ɪ": 1.15          # CHOICE — wide
      "æ ɪ": 0.95          # FACE — narrow (Australian raised onset)
      "ə ᵘ": 0.92          # GOAT — narrow (fronted offglide)
    durationFloorMs: 60
    onsetHoldExponent: 1.7
    microFrameIntervalMs: 8

  lengthContrast:
    enabled: false

  # ── Allophone rules ────────────────────────────────────────────
  allophoneRules:
    enabled: true
    rules:
    # ── Intervocalic flapping (/t,d/ → [ɾ]) ─────────────────────
    # Australians flap like Americans: "water" [woːɾə], "city" [sɪɾi],
    # "butter" [bɐɾə], "better" [beɾə].
      - name: australian_flapping
        phonemes: [t, d]
        position: intervocalic
        stress: next-unstressed
        action: replace
        replaceTo: ɾ
        replaceDurationMs: 30.0
        replaceRemovesClosure: true
        replaceClosureScale: 0
        replaceRemovesAspiration: false

    # ── /l/ darkness by position ─────────────────────────────────
    # Australian dark-L is moderate — between RP's strong coda
    # darkness and lighter GenAm style.
      - name: dark_l_post_vocalic
        phonemes: [l, ɫ]
        position: post-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.82
          - field: pf2
            targetHz: 900.0
            blend: 0.82

      - name: dark_l_syllabic
        phonemes: [l, ɫ]
        position: syllabic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.88
          - field: pf2
            targetHz: 900.0
            blend: 0.88

      - name: light_l_pre_vocalic
        phonemes: [l, ɫ]
        position: pre-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 900.0
            blend: 0.2
          - field: pf2
            targetHz: 900.0
            blend: 0.2

    # ── Post-sibilant aspiration suppression ─────────────────────
    # Universal English rule: "style" vs "tile", "spin" vs "pin".
      - name: post_sibilant_aspiration_suppress
        tokenType: aspiration
        after: ["s", "ʃ"]
        action: scale
        durationScale: 0.05
        fieldScales:
          aspirationAmplitude: 0.05
          fricationAmplitude: 0.05

    # ── Voiceless stop burst rebalance ─────────────────────────────
    # Base phonemes have very high frication relative to burst energy:
    #   /t/ fricationAmplitude=0.92 vs /t͡ʃ/ fricationAmplitude=0.88
    #   /p/ fricationAmplitude=0.75 vs /f/  fricationAmplitude=1.00
    # This makes stops sound fricative-like (/t/→"ch", /p/→"f").
    # Fix: cut frication, boost burst transient + aspiration to widen
    # the perceptual gap between stops and their fricative confusors.
      - name: voiceless_stop_burst_boost
        flags: [stop]
        notFlags: [voiced]
        action: scale
        fieldScales:
          fricationAmplitude: 0.82
          aspirationAmplitude: 1.35
          pa1: 1.25
          pa2: 1.20

    # ── Pre-stop unreleased (first stop in cluster) ──────────────
    # In natural speech the first stop in a cluster like /kt/ ("locked"),
    # /pt/ ("kept"), /gd/ ("bagged") is unreleased — the vocal tract
    # moves directly from one closure to the next without an audible
    # burst (Ladefoged & Maddieson 1996).  Only the LAST stop gets
    # released.  Without this, both stops fire full bursts and merge
    # into one big click that's hard to parse as two consonants.
      - name: stop_before_stop_unreleased
        flags: [stop]
        beforeFlags: [stop]
        action: scale
        fieldScales:
          fricationAmplitude: 0.12
          aspirationAmplitude: 0.08

    # ── Unreleased word-final stops ──────────────────────────────
    # Australians often have unreleased or glottalized final stops,
    # similar to RP but slightly softer.  Between RP and GenAm.
    #
    # FIXED: Old rule kept frication high while crushing the burst
    # AND tilting it upward (pa4×1.3, pa5×1.4) into the sibilant
    # range — reshaping /t/ toward /t͡ʃ/.  New rule cuts frication
    # harder, preserves more burst, removes the sibilant tilt.
      - name: unreleased_word_final
        flags: [stop]
        notFlags: [voiced]
        notAfterFlags: [stop]
        position: word-final
        action: scale
        durationScale: 0.82
        fieldScales:
          fricationAmplitude: 0.55
          aspirationAmplitude: 0.60
          pa1: 0.40
          pa2: 0.55
          pa3: 0.60
          pa4: 0.50
          pa5: 0.40
          pa6: 0.30

    # ── Velar word-final boost ─────────────────────────────────────
    # Velar stops have "compact" burst energy in mid-frequencies.
    # The general unreleased_word_final rule makes /k/ too quiet
    # in words like "rock", "back".  Boost mid-range burst and
    # aspiration to restore presence.
      - name: velar_word_final_boost
        flags: [stop]
        notFlags: [voiced]
        place: velar
        position: word-final
        action: scale
        fieldScales:
          aspirationAmplitude: 1.40
          pa2: 1.35
          pa3: 1.30

    # ── Post-nasal /d/ burst softening ──────────────────────────────
    # /nd/ clusters ("calendar", "understand") sound affricated on small
    # speakers because nasal release adds frication energy.  Roll off
    # upper burst components so /d/ stays clean.
      - name: post_nasal_d_soften
        phonemes: ["d"]
        afterFlags: [nasal]
        action: scale
        fieldScales:
          pa5: 0.70
          pa6: 0.55

  # ── Boundary smoothing ─────────────────────────────────────────
  # Australian sits between RP crispness and GenAm flow.
  boundarySmoothing:
    enabled: true
    f1Scale: 0.50
    f2Scale: 0.50
    f3Scale: 0.80

    nasalF1Instant: true
    nasalF2F3SpansPhone: true

    liquidToVowelFadeMs: 20
    vowelToLiquidFadeMs: 18
    stopToVowelFadeMs: 19
    vowelToStopFadeMs: 21
    fricToVowelFadeMs: 17
    vowelToFricFadeMs: 17
    nasalToVowelFadeMs: 15
    vowelToNasalFadeMs: 15
    nasalToStopFadeMs: 11
    liquidToStopFadeMs: 11
    fricToStopFadeMs: 9
    stopToFricFadeMs: 13
    vowelToVowelFadeMs: 19

    highRateFadeRatioFloor: 0.40

    labialF1Scale: 0.30
    labialF2Scale: 0.52
    labialF3Scale: 0.52
    alveolarF1Scale: 0.39
    alveolarF2Scale: 0.49
    alveolarF3Scale: 0.62
    palatalF1Scale: 0.34
    palatalF2Scale: 0.52
    palatalF3Scale: 0.72
    velarF1Scale: 0.34
    velarF2Scale: 0.62
    velarF3Scale: 0.57

  # ── Trajectory limiting ────────────────────────────────────────
  trajectoryLimit:
    enabled: true
    applyAcrossWordBoundary: true
    windowMs: 25
    liquidRateScale: 1.5
    applyTo: [cf2, cf3, pf2, pf3]
    maxHzPerMs:
      cf2: 26
      cf3: 22
      pf2: 18
      pf3: 22

  # ── Special coarticulation ─────────────────────────────────────
  # Non-rhotic: no rhotic vowel coloring.  Otherwise similar to RP.
  specialCoarticulation:
    enabled: true
    maxDeltaHz: 350
    rules:
      - name: labial-f2-lowering
        triggers: ["w", "b", "p", "m"]
        vowelFilter: all
        formant: f2
        deltaHz: -45
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: alveolar-back-vowel-fronting
        triggers: ["t", "d", "n", "s", "z"]
        vowelFilter: back
        formant: f2
        deltaHz: 58
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: palatal-f2-raising
        triggers: ["j"]
        vowelFilter: all
        formant: f2
        deltaHz: 70
        side: right
        cumulative: false
        unstressedScale: 0.4

      - name: pre-velar-f2-raise
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f2
        deltaHz: 80
        side: right
        cumulative: false
        unstressedScale: 0.7

      - name: pre-velar-f3-lower
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f3
        deltaHz: -100
        side: right
        cumulative: false
        unstressedScale: 0.7

  # ── Cluster timing ─────────────────────────────────────────────
  clusterTiming:
    enabled: true
    fricBeforeStopScale: 0.70
    stopBeforeFricScale: 0.75
    fricBeforeFricScale: 0.78
    stopBeforeStopScale: 0.65
    tripleClusterMiddleScale: 0.60
    affricateInClusterScale: 0.78
    wordMedialConsonantScale: 0.90
    wordFinalObstruentScale: 0.92

  # ── Cluster blend ──────────────────────────────────────────────
  clusterBlend:
    enabled: true
    forwardDriftStrength: 0.28

  # ── Rate compensation ──────────────────────────────────────────
  rateCompensation:
    enabled: true
    minimumDurations:
      vowelMs: 20
      fricativeMs: 18
      stopMs: 4
      nasalMs: 18
      liquidMs: 15
      affricateMs: 12
      semivowelMs: 10
      tapMs: 4
      trillMs: 12
      voicedConsonantMs: 10
    wordFinalBonusMs: 5
    floorSpeedScale: 0.0
    clusterProportionGuard: true
    clusterMaxRatioShift: 0.4
    sonorantContextBonusMs: 8
    schwaReduction:
      enabled: false
      threshold: 2.5
      scale: 0.8

  sonorantContextAmplitudeScale: 1.15

  # ── Syllable duration ──────────────────────────────────────────
  syllableDuration:
    enabled: true
    onsetScale: 1.10
    codaScale: 0.85
    unstressedOpenNucleusScale: 0.90

  # ── Syllable structure ─────────────────────────────────────────
  syllableStructure:
    legalOnsets:
      - pl
      - pɹ
      - bl
      - bɹ
      - tɹ
      - tw
      - dɹ
      - dw
      - kl
      - kɹ
      - kw
      - ɡl
      - ɡɹ
      - ɡw
      - fl
      - fɹ
      - fj
      - θɹ
      - sl
      - sm
      - sn
      - sp
      - st
      - sk
      - sw
      - ʃɹ
      - vj
      - hj
      - bj
      - pj
      - pw
      - kj
      - tj
      - dj
      - mj
      - nj
      - lj
      - spl
      - spɹ
      - stɹ
      - skɹ
      - skw
      - skl
      - spj
      - stj
      - skj

  legacyPitchMode: espeak_style
  legacyPitchInflectionScale: 0.56

# ═════════════════════════════════════════════════════════════════
# NORMALIZATION
# ═════════════════════════════════════════════════════════════════
#
# Pipeline order:
#   1. preReplacements (raw eSpeak IPA — tie bars still present)
#   2. Internal cleanup (ZWJ/ZWNJ, underscore, bracket stripping)
#   3. replacements (after internal transforms)
#   4. Tokenization → passes → frame emission
#
# Strategy for Australian vowels:
#   - preReplacements: diphthong protection (tie bars prevent later
#     rules from mangling offglides), R-dropping, FACE lowering
#   - replacements: vowel quality shifts (KIT centralization, STRUT
#     fronting, happY laxing, GOOSE fronting, NURSE de-rhoticization)

normalization:
  preReplacements:
    # ── Diphthong protection ─────────────────────────────────────
    # Insert tie bars to protect diphthong sequences from being
    # split by later replacement rules (e.g. TRAP a→æ).  The tie
    # bar blocks applyRules from matching inside the pair, and
    # autoTieDiphthongs skips already-tied tokens.

    # FACE: Lower the onset from [eɪ] to [æɪ].
    # This is THE signature Australian vowel shift — "day" sounds
    # like [dæɪ], "make" like [mæɪk].  The tie bar protects ɪ
    # from the KIT centralization rule in replacements.
    - from: "eɪ"
      to:   "æ͡ɪ"

    # PRICE: Protect from TRAP rule (a→æ).
    # With tie-insensitive matching, catches both aɪ and a͡ɪ.
    - from: "a͡ɪ"
      to:   "ɑ͡ɪ"

    # MOUTH: Same protection as PRICE.
    - from: "a͡ʊ"
      to:   "ɑ͡ʊ"

    # CHOICE: eSpeak gives ɔɪ without tie bar.  Protect the ɪ offglide.
    - from: "ɔɪ"
      to:   "ɔ͡ɪ"

    # GOAT: Front the offglide from British [əʊ] to Australian [əʉ].
    # eSpeak gives əʊ for all GOAT words (window, go, home, road…).
    # The back ʊ (F2≈1066) sounds distinctly British; Australian GOAT
    # glides to a fronted target [ʉ] (F2≈1700).  Using our dedicated
    # ᵘ phoneme as the offglide.  The tie bar ensures the diphthong
    # collapse pass sees this as a single sweep from ə to ᵘ.
    - from: "əʊ"
      to:   "ə͡ᵘ"

    # ── Non-rhotic R-dropping ────────────────────────────────────
    # Australian English is non-rhotic: drop post-vocalic /ɹ/ at
    # word-end and before consonants.  Prevocalic R (red, three)
    # and onset R (run, green) are preserved.
    # Must run in preReplacements so the R is gone before vowel
    # sequence rules (NEAR iə→iᵊ, SQUARE eə→ɛᵊ) see word-end.
    - from: "ɹ"
      to:   ""
      when:
        afterClass: VOWELISH
        atWordEnd: true
    - from: "ɹ"
      to:   ""
      when:
        afterClass: VOWELISH
        beforeClass: CONSONANTS
    - from: "r"
      to:   ""
      when:
        afterClass: VOWELISH
        atWordEnd: true
    - from: "r"
      to:   ""
      when:
        afterClass: VOWELISH
        beforeClass: CONSONANTS

  classes:
    # ── Vowel-like characters ────────────────────────────────────
    # Used by the non-rhotic R-dropping rules (afterClass: VOWELISH).
    # Must include all vowel symbols eSpeak might emit before an R.
    VOWELISH:
      - "a"
      - "e"
      - "i"
      - "o"
      - "u"
      - "y"
      - "ɐ"
      - "ɑ"
      - "ɒ"
      - "ɔ"
      - "ə"
      - "ɚ"
      - "ɛ"
      - "ɜ"
      - "ɝ"
      - "ɪ"
      - "ʊ"
      - "ʌ"
      - "æ"
      - "ᵻ"
      - "ᵾ"
      - "ᵿ"
      - "ʉ"
      - "ᵉ"
      - "ᵘ"
      - "ᴏ"
      - "ᴐ"
      - "ᵒ"
      - "ᵊ"

    CONSONANTS:
      - "b"
      - "d"
      - "f"
      - "g"
      - "h"
      - "j"
      - "k"
      - "l"
      - "m"
      - "n"
      - "p"
      - "s"
      - "t"
      - "v"
      - "w"
      - "x"
      - "z"
      - "ŋ"
      - "ɡ"
      - "ɣ"
      - "ɫ"
      - "ɲ"
      - "ɹ"
      - "ɻ"
      - "ɾ"
      - "ʃ"
      - "ʒ"
      - "ʔ"
      - "θ"
      - "ð"
      - "ç"
      - "β"
      - "t͡ʃ"
      - "d͡ʒ"
      - "t͡s"
      - "d͡z"

    # ── Vowels class (for beforeClass/afterClass checks) ─────────
    VOWELS: ["a", "e", "i", "o", "u", "ɐ", "ə", "ɜ", "ɑ", "ɒ", "ɔ", "ɛ", "æ", "ʊ", "ɪ", "ᵻ", "ᵾ", "ʉ", "ᵉ", "ᵘ", "ᴏ", "ᴐ", "ã", "ẽ", "ĩ", "õ", "ũ"]

  replacements:
    # ══════════════════════════════════════════════════════════════
    # RULE ORDER MATTERS.  The applyRules engine processes rules
    # sequentially; each rule sees the string as modified by all
    # previous rules.  Same-length replacements chain intentionally.
    # ══════════════════════════════════════════════════════════════

    # ── KIT centralization: SUPERSEDED by KIT fronting (ɪ→ɪ_au) ──
    # The old approach lowered F2 (centralized toward ɘ) which caused
    # a "ü artifact". The 2016 hand-tuned build went the OPPOSITE
    # direction — FRONTING KIT to cf2=2070. See ɪ→ɪ_au rule below.

    # ── happY vowel: i → ɪ (word-final) ─────────────────────────
    # Australian happY leans toward [ɪ] rather than tense [i].
    # Safe: stressed /iː/ (free, key, see) always carries ː from
    # eSpeak and won't match bare "i".
    - from: "i"
      to:   "ɪ"
      when:
        atWordEnd: true

    # ── STRUT fronting: ʌ → ɐ ────────────────────────────────────
    # Australian STRUT is fronted: [ɐ] (F1=530, F2=1310) rather
    # than RP/GenAm [ʌ] (F1=580, F2=1200).  F2 rises ~110 Hz.
    # Affects "but", "cup", "love", "come", "done", "strut", etc.
    - from: "ʌ"
      to:   "ɐ"

    # ── KIT fronting: ɪ → ɪ_au ─────────────────────────────────
    # 2016 Australian build had KIT at cf2=2070 — fronted, NOT
    # centralized. The earlier "ü artifact" came from LOWERING F2
    # (centralizing toward ɘ). RAISING F2 (fronting toward i)
    # gives the characteristic Australian KIT without rounding.
    # ɪ_au (cf2=2050) vs base ɪ (cf2=1800) — +250 Hz fronting.
    # Affects: "kit", "bit", "sit", "fish", "six", "thick", etc.
    - from: "ɪ"
      to:   "ɪ_au"

    # ── STRUT opening: ɐ → ɐ_au ───────────────────────────────
    # 2016 build: cf1=770.  Current ɐ: cf1=530.  That's 240 Hz
    # more open — approaching [a] territory, which is correct for
    # General Australian STRUT.  This is the single biggest
    # character difference between AU and RP.
    # Affects: "but", "cup", "love", "come", "done", "strut", etc.
    - from: "ɐ"
      to:   "ɐ_au"

    # ── LOT backing: ɒ → ɒ_au ─────────────────────────────────
    # 2016 build: cf2=990.  Current ɒ: cf2=1100.  Australian LOT
    # is backer than RP, creating better separation from the very
    # open STRUT.  Also cf1=685 (slightly more open).
    # Affects: "lot", "hot", "not", "dog", "off", "stop", etc.
    - from: "ɒ"
      to:   "ɒ_au"

    # ── TRAP normalization: a → æ ────────────────────────────────
    # Same as en.yaml base rule, but we restate it here because
    # Australian BATH = TRAP.  Unlike en-gb which broadens a/æ → ᵅː
    # before BATH_FOLLOW consonants (s, f, θ), we keep ALL "a"
    # tokens as short æ.  "Dance", "class", "bath" = [dæns],
    # [klæs], [bæθ] — not [dɑːns], [klɑːs], [bɑːθ].
    - from: "a"
      to:   "æ"

    # ── DRESS raising: ɛ → ᵉ ────────────────────────────────────────
    # Australian DRESS is raised from [ɛ] toward close-mid [e].
    # ᵉ (F1=470, F2=1950) vs base ɛ (F1=530, F2=1750) — F1 drops
    # 60 Hz (moderately raised) and F2 rises 200 Hz (fronted).
    # Targets contemporary General Australian: clearly raised from
    # RP/GenAm ɛ, but not the extreme Broad Aus of Cox (2006).
    # Cox & Palethorpe (2008) documented ongoing short front vowel
    # lowering in younger speakers, so this moderate target is
    # more representative of current General Australian.
    # Affects: "bed", "head", "said", "yes", "dress", "red", etc.
    - from: "ɛ"
      to:   "ᵉ"

    # ── NURSE: de-rhoticize ──────────────────────────────────────
    # Non-rhotic: any ɝ that leaks through (from other pack layers
    # or eSpeak variants) should be plain ɜ.
    - from: "ɝː"
      to:   "ɜː"
    - from: "ɝ"
      to:   "ɜ"

    # ── NEAR vowel: iə → iᵊ (word-final) ────────────────────────
    # Non-rhotic NEAR: "fear", "hear", "beer" end in a short
    # schwa-like transition after the R is dropped.
    - from: "iə"
      to:   "iᵊ"
      when:
        atWordEnd: true
    - from: "i͡ə"
      to:   "iᵊ"
      when:
        atWordEnd: true

    # ── SQUARE vowel: eə → ᵉᵊ (word-final) ──────────────────────
    # Australian SQUARE tends toward monophthongal [eː], sharing
    # quality with raised DRESS [e].  eSpeak gives "eə" after
    # R-dropping.  Map directly to ᵉ + short ᵊ tail.
    # Using ᵉ (F1=430, F2=2050) matches the raised Australian
    # DRESS quality, and the brief ᵊ prevents an abrupt cutoff.
    - from: "eə"
      to:   "ᵉᵊ"
      when:
        atWordEnd: true

    # ── GOOSE fronting: ᵾ → ᵘ ────────────────────────────────────
    # Australian GOOSE is heavily fronted [ʉ̟ː].  en.yaml maps u→ᵾ
    # (F2=1350); we push to ᵘ (F2=1700) — significantly more fronted
    # than generic ʉ (F2=1500).  This is the characteristically
    # forward Australian "ooh" in "food", "school", "two", "blue".
    - from: "ᵾ"
      to:   "ᵘ"

    # ── THOUGHT: keep as ɔ ───────────────────────────────────────
    # Australian THOUGHT [oː] is similar to the base ɔ (F1=450,
    # F2=870).  No mapping needed — the base phoneme is close.
    # We intentionally do NOT apply RP's or US's THOUGHT shifts.

    # ── GOAT: keep as əʊ ─────────────────────────────────────────
    # eSpeak gives əʊ for GOAT which already fits Australian [əʉ].
    # The diphthong collapse pass handles the formant sweep.
    # No explicit mapping needed.

    # ── START/PALM: keep base ɑ ──────────────────────────────────
    # The base ɑ (F1=700, F2=1330) is described in phonemes.yaml as
    # "suited for Australian" — fronted enough for Australian START.
    # We intentionally do NOT use RP's back ᵅ (F2=1200).
    # "Park", "car", "heart", "father", "calm" all get the fronted ɑ.

    # ── Undo UK THOUGHT tweak from en.yaml ───────────────────────
    # en.yaml may map ɔː→ᴏː for UK THOUGHT; undo that here.
    - from: "ᴏ"
      to:   "ɔ"

    # ── Word-final schwa-ɹ cleanup ───────────────────────────────
    # After R-dropping, words like "water" → wˈɔːtə, "better" → bˈɛtə.
    # The schwa is already correct.  No further mapping needed.

# ═════════════════════════════════════════════════════════════════
# PHONEME NOTES (no overrides needed — existing phonemes suffice)
# ═════════════════════════════════════════════════════════════════
#
# Phoneme      Australian target   Existing phoneme used    Notes
# ─────────    ─────────────────   ─────────────────────    ─────
# KIT [ɪ]      F2≈1800             ɪ (F1=360, F2=1800)     base ɪ (centralization disabled)
# DRESS [e]    F2≈1950             ᵉ (F1=470, F2=1950)     ★ NEW — raised from ɛ (GenAus)
# TRAP [æ]     F2≈1660             æ (F1=620, F2=1660)     standard
# STRUT [ɐ]    F2≈1310             ɐ (F1=530, F2=1310)     fronted ʌ
# LOT [ɒ]      F2≈1100             ɒ (F1=660, F2=1100)     as RP
# PALM [aː]    F2≈1330             ɑ (F1=700, F2=1330)     fronted, not RP back
# GOOSE [ʉ̟ː]   F2≈1700             ᵘ (F1=310, F2=1700)     ★ NEW — heavily fronted
# NURSE [ɜː]   F2≈1400             ɜ (F1=500, F2=1400)     non-rhotic
# THOUGHT [oː] F2≈870              ɔ (F1=450, F2=870)      standard
# FACE [æɪ]    onset F2≈1660       æ→ɪ via diphthong collapse  lowered onset
# GOAT [əʉ]    onset F2≈1630       ə→ᵘ via diphthong collapse  fronted offglide
# PRICE [ɑɪ]   onset F2≈1330       ɑ→ɪ via diphthong collapse  open onset
# MOUTH [ɑʊ]   onset F2≈1330       ɑ→ʊ via diphthong collapse  open onset
# CHOICE [ɔɪ]  standard            ɔ→ɪ via diphthong collapse  as RP
# happY [ɪ]    F2≈1800             ɪ (F1=360, F2=1800)     lax, not tense [i]
# NEAR [ɪə]    non-rhotic          i→ᵊ via normalization   schwa offglide
# SQUARE [eː]  monophthong         ᵉ→ᵊ via normalization   shares DRESS quality
