# Italian (it)

settings:
  primaryStressDiv: 1.25
  secondaryStressDiv: 1.07

  # Nasal+stop clusters (campo, tanto, banco) — protect stop from being swallowed at speed
  stopClosureNasalToStopGapMs: 10
  stopClosureNasalToStopFadeMs: 2

  # Trill modulation (rolled R). Applied only when the phoneme has _isTrill: true.
  trillModulationMs: 50
  trillModulationFadeMs: 2

  # Italian uses consonant gemination (eSpeak marks this with ː on consonants)
  lengthenedScale: 1.55
  applyLengthenedScaleToVowelsOnly: false
  lengthContrastEnabled: true
  lengthContrastGeminateClosureScale: 1.9
  lengthContrastGeminateReleaseScale: 0.9
  lengthContrastPreGeminateVowelScale: 0.88
  # Single-word utterance smoothing (key echo / word-by-word navigation)
  singleWordTuningEnabled: true
  singleWordFinalHoldMs: 45
  singleWordFinalFadeMs: 18
  singleWordClauseTypeOverride: "."
  singleWordClauseTypeOverrideCommaOnly: true

  thousandsSeparatorCommaToSpace: true

  dictSuffixes:
    - "mente" # adverb
    - "i"     # masculine plural
    - "e"     # feminine plural

normalization:
  replacements:
    # === ITALIAN VOWEL TUNING ===
    # Italian has 7 pure vowels. Base phonemes too centralized.
    # Reuse existing language phonemes where targets overlap.
    - from: i
      to: i_hu
    - from: u
      to: u_fi
    - from: o
      to: o_fi
    - from: e
      to: e_fi
    - from: "ɔ"
      to: "ɔ_fr"
    # Italian /a/ is open central — brighter than Slavic /a/.
    # Base ɑ (700/1330) fits well. a_open (720/1200) is too back.
    - from: a
      to: "ɑ"

