# English (Canada) (en-ca)
#
# eSpeak voice: en-us (American IPA base).  All platforms map en-ca
# to eSpeak en-us so we get American-style taps, LOT, GOAT, etc.
# This pack then layers Canadian-specific adjustments on top.
#
# Key Canadian features:
#   1. Canadian Raising: PRICE/MOUTH onset raised before voiceless
#   2. COT-CAUGHT merger: LOT and THOUGHT merge
#   3. GOAT backing: no American fronting

settings:
  # Canada is largely closer to US timing than the UK baseline in en.yaml.
  lengthenedScale: 1.05
  # Keep the same fronted GOOSE vowel as the base English pack.
  englishLongUKey: "ᵿ"
  # Helps "bank" / "think" / "thanks" etc feel less "boxy" by giving nasal+stop
  # clusters a tiny bit of separation.
  stopClosureAfterNasalsEnabled: true
  allophoneRulesEnabled: true

normalization:
  preReplacements:
    # eSpeak (classic) can pronounce "Microsoft" with /ɑ(ː)/ for the "-soft" syllable
    # in some English voices. "soft" itself is /sɔft/, so normalize the compound.
    #
    # This is intentionally narrow: it only matches secondary-stressed "soft".
    - from: "sˌɑːft"
      to:   "sˌɔft"
    - from: "sˌɑft"
      to:   "sˌɔft"

    # Canadian "sorry" uses FORCE vowel /ɔːɹ/ ("sore-y"), not LOT /ɑːɹ/ ("sarry").
    - from: "sˈɑːɹi"
      to:   "sˈɔːɹi"

  classes:
    # Vowels (including schwa/r-colored and extra internal keys used by English packs).
    VOWELS: ["a", "e", "i", "o", "u", "ɐ", "ə", "ɜ", "ɝ", "ɑ", "ɒ", "ɔ", "ɛ", "æ", "ʊ", "ɪ", "ᵾ", "ᵿ", "ᴏ", "ᴐ", "ᴒ", "ã", "ẽ", "ĩ", "õ", "ũ", "ᴜ"]

    # Voiceless obstruents — Canadian Raising triggers before these.
    VOICELESS_OBSTRUENTS: ["p", "t", "k", "f", "θ", "s", "ʃ", "ʔ", "h"]

  replacements:

    # Acronyms like "NVDA" / "GPDA" end in ...diːˈeɪ. If we rewrite eɪ -> ej,
    # the final letter "A" can sound like "dee-yay". Keep that final A as a
    # long monophthong instead.
    - from: "iːˈeɪ"
      to:   "iːˈeː"
    - from: "iːˈe͡ɪ"
      to:   "iːˈeː"
    - from: "iːˌeɪ"
      to:   "iːˌeː"
    - from: "iːˌe͡ɪ"
      to:   "iːˌeː"

    # Make FACE (eɪ) sound like a real diphthong instead of a flat "e".
    - from: "eɪ"
      to:   "ej"
    - from: "e͡ɪ"
      to:   "e͡j"

    # ── Canadian Raising: PRICE ──────────────────────────────────
    # Before voiceless obstruents: raise onset /a/ → /ʌ/ (F1 580 vs 700).
    # "right" [ʌɪt], "ice" [ʌɪs], "knife" [nʌɪf]
    # Before voiced or word-finally: normal low onset like en-us.
    # "ride" [ɑɪd], "eye" [ɑɪ], "time" [tɑɪm]
    - from: "a͡ɪ"
      to:   "ʌ͡ɪ"
      when:
        beforeClass: VOICELESS_OBSTRUENTS
    - from: "aɪ"
      to:   "ʌ͡ɪ"
      when:
        beforeClass: VOICELESS_OBSTRUENTS

    # Default PRICE (before voiced / word-final) — same onset as en-us.
    - from: "a͡ɪ"
      to:   "ɑ͡ɪ"
    - from: "aɪ"
      to:   "ɑ͡ɪ"

    # ── Canadian Raising: MOUTH ──────────────────────────────────
    # Before voiceless: raise onset /a/ → /ʌ/.
    # "about" [əbʌʊt], "out" [ʌʊt], "house" [hʌʊs]
    # Before voiced or word-finally: normal open onset.
    # "loud" [laʊd], "how" [haʊ], "down" [daʊn]
    - from: "a͡ʊ"
      to:   "ʌ͡ʊ"
      when:
        beforeClass: VOICELESS_OBSTRUENTS
    - from: "aʊ"
      to:   "ʌ͡ʊ"
      when:
        beforeClass: VOICELESS_OBSTRUENTS

    # Default MOUTH (before voiced / word-final) — same as en-us.
    - from: "a͡ʊ"
      to:   "ä͡ʊ"
    - from: "aʊ"
      to:   "ä͡ʊ"

    # ── GOAT ─────────────────────────────────────────────────────
    # Canadian GOAT stays backed — no American fronting (o → ᵒ).
    # Diphthong collapse pass handles tying, same as en-us.

    # Use a slightly less-fronted GOOSE vowel in US/CA to avoid an overly "oo" quality
    # in words like "grouping" and "toolbar".
    - from: "ᵾ"
      to: "ᵿ"

    # Reduced vowel ɐ can sound a bit "boxy" in our formant table.
    # Use a more neutral schwa for US/CA.
    - from: "ɐ"
      to: "ə"

    # ── COT-CAUGHT merger ────────────────────────────────────────
    # THOUGHT: make /ɔ/ more open (same as en-us baseline).
    - from: "ɔː"
      to: "ᴐː"
    - from: "ɔ"
      to: "ᴐ"

    # NOTE:
    # We intentionally *do not* undo the base English fronting of long /uː/.
    # It helps avoid the "roo" quality in words like "rules".
    # Force rhotic NURSE.
    - from: "ɜː"
      to: "ɝː"
    - from: "ɜ"
      to: "ɝ"

    # START lexical set (park, party, shard, card, garden, market…):
    # Same fix as en-us — ɑ before ɹ sounds too open/Australian in the
    # formant synth.  Map to ʌ for natural North American "ah" quality.
    - from: "ɑːɹ"
      to:   "ʌɹ"
    - from: "ɑɹ"
      to:   "ʌɹ"

    # COT-CAUGHT merger: remaining LOT vowels (not consumed by START above)
    # merge with THOUGHT. "cot" = "caught", "Don" = "dawn".
    - from: "ɑː"
      to:   "ᴐː"
    - from: "ɑ"
      to:   "ᴐ"

    # Use the dedicated US/CA /r/ variant.
    - from: "ɹ"
      to: "ɻ"
