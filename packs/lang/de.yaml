# German (de)
# Enhanced with uvular R, vocalized -er, strong stop aspiration,
# glottal stop (Knacklaut), tense/lax vowels, and proper fricatives

settings:
  # German has strong lexical stress on stems
  # More prominent than Dutch but less than English
  primaryStressDiv: 1.30
  secondaryStressDiv: 1.12

  # German reduces word-final schwas (e.g., "-e" endings)
  wordFinalSchwaReductionEnabled: true
  wordFinalSchwaScale: 0.55
  wordFinalSchwaMinDurationMs: 6.0

  # German has clear tense/lax (long/short) vowel contrast - keep moderate
  lengthenedScale: 1.18

  # Vowel length is phonemic - moderate values
  lengthContrastEnabled: true
  lengthContrastShortVowelCeilingMs: 68
  lengthContrastLongVowelFloorMs: 88

  # German has no phonemic geminates in native words
  # (like Dutch, double consonants indicate short preceding vowel)

  # German stops - aspirated initially, unaspirated after s/ʃ
  # Clear closure for characteristic "choppy" German sound
  stopClosureMode: always
  stopClosureVowelGapMs: 24
  stopClosureVowelFadeMs: 6
  stopClosureClusterGapMs: 18
  stopClosureClusterFadeMs: 5

  # German glottal stop before vowel-initial words (Knacklaut)
  # This is what makes German sound "choppy" to English ears
  # Enable glottal reinforcement for vowel-initial stressed syllables
  allophoneRulesEnabled: true
  allophoneRules:
    enabled: true
    rules:
      # German Knacklaut: glottal stop before vowel-initial stressed syllables
      - name: glottal_reinforcement
        flags: [stop]
        notFlags: [voiced]
        position: word-final
        action: insert-before
        insertPhoneme: ʔ
        insertDurationMs: 18.0
        insertFadeMs: 3.0
        insertContexts: ["V_#"]

  # Smooth transitions for consonant clusters
  boundarySmoothingEnabled: true

  # ── Contextual rules ───────────────────────────────────────────
  contextualRules:
    # ── Voiceless stop burst rebalance ─────────────────────────────
    # Base phonemes have very high frication relative to burst energy:
    #   /t/ fricationAmplitude=0.92 vs /t͡ʃ/ fricationAmplitude=0.88
    #   /k/ fricationAmplitude=0.65 vs /x/  fricationAmplitude=0.70
    # This makes stops sound fricative-like (/t/→"ch", /k/→"f"/"t").
    # Fix: cut frication, boost burst transient + aspiration to widen
    # the perceptual gap between stops and their fricative confusors.
      - name: voiceless_stop_burst_boost
        flags: [stop]
        notFlags: [voiced]
        action: scale
        fieldScales:
          fricationAmplitude: 0.78
          aspirationAmplitude: 1.45
          pa1: 1.30
          pa2: 1.25

    # ── German onset aspiration boost ──────────────────────────────
    # German voiceless stops are MORE aspirated than English (VOT
    # ~60-80ms vs English ~50-70ms).  Boost aspiration on word-initial
    # voiceless stops to make /t/ clearly distinct from /d/.
    # Without this, /t/ sounds "soft, like a d" (user feedback).
      - name: german_onset_aspiration
        flags: [stop]
        notFlags: [voiced]
        position: word-initial
        action: scale
        fieldScales:
          aspirationAmplitude: 1.30
          fricationAmplitude: 0.85

    # ── Post-sibilant aspiration suppression ─────────────────────
    # "Stein" vs "Tein", "Spiel" vs "Piel", "Ski" vs "Ki".
    # After /s/ or /ʃ/, German voiceless stops lose aspiration.
      - name: post_sibilant_aspiration_suppress
        tokenType: aspiration
        after: ["s", "ʃ"]
        action: scale
        durationScale: 0.05
        fieldScales:
          aspirationAmplitude: 0.05
          fricationAmplitude: 0.05

    # ── Unreleased word-final stops ──────────────────────────────
    # German word-final stops are often unreleased, especially after
    # final devoicing (Tag→[taːk], Rad→[raːt]).  Cut frication
    # hard and preserve burst character — no sibilant tilt.
      - name: unreleased_word_final
        flags: [stop]
        notFlags: [voiced]
        position: word-final
        action: scale
        durationScale: 0.82
        fieldScales:
          fricationAmplitude: 0.55
          aspirationAmplitude: 0.60
          pa1: 0.40
          pa2: 0.55

  # German R - uvular in most standard accents
  trillModulationMs: 40
  trillModulationFadeMs: 5

  # Single-word tuning
  singleWordTuningEnabled: true
  singleWordFinalHoldMs: 48
  singleWordFinalFadeMs: 18

  # Enable microprosody
  microprosodyEnabled: true
  microprosodyVoicedF0LowerEnabled: true
  microprosodyVoicedF0LowerHz: -5

normalization:
  preReplacements:
    # ── eSpeak IPA rendering bug: ʊR → "??" ────────────────────
    # eSpeak's German voice cannot map its internal short-ʊ + uvular-R
    # phoneme combination to IPA, outputting literal ASCII "??" instead.
    # Affects common words: Kurz, Wurm, Burg, Turm, durch, Furcht, Gurke…
    # (Long uː+r words like Wurst/Kurs are fine.)
    # X-SAMPA output shows "UR" for these, confirming ʊ+R.
    # Must run FIRST before any other rules see the bad characters.
    - from: "??"
      to: "ʊʁ"

    # ── R normalization ──────────────────────────────────────────
    # Standard German R is uvular [ʁ], not alveolar.
    # eSpeak emits alveolar r/ɾ for most German R contexts.
    - from: "r"
      to: "ʁ"
    - from: "ɾ"
      to: "ʁ"

    # Vocalized r: if eSpeak gives non-syllabic ɐ̯, normalize to ɐ
    - from: "ɐ̯"
      to: "ɐ"

    # German affricates: ensure tie bar for /pf/
    - from: "pf"
      to: "p͡f"

  replacements:
    # ── Vocalized R (-er endings) ────────────────────────────────
    # eSpeak uses ɜ (NURSE vowel) for German word-final -er:
    #   Vater → fˈɑːtɜ, Mutter → mˈʊtɜ, Lehrer → lˈeːrɜ
    # In Standard German, word-final -er is vocalized to [ɐ].
    # This is the most common R context in German and the current
    # gap makes every -er word sound English.  Safe to map all ɜ→ɐ
    # since eSpeak only uses ɜ in this R-vocalization position.
    - from: "ɜ"
      to: "ɐ"

intonation:
  # German declaratives - clear terminal fall
  # German intonation is more "matter-of-fact" than English
  ".":
    preHeadStart: 65
    preHeadEnd: 50
    nucleus0Start: 62
    nucleus0End: 12
    nucleusStart: 68
    nucleusEnd: 10
    tailStart: 15
    tailEnd: 5

  # German yes/no questions - rise
  "?":
    preHeadStart: 50
    preHeadEnd: 60
    nucleus0Start: 55
    nucleus0End: 85
    nucleusStart: 52
    nucleusEnd: 90
    tailStart: 85
    tailEnd: 95

  # German wh-questions typically fall (like statements)
  # But we only have "?" so this uses rising pattern
