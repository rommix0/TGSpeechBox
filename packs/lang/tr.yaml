# packs/lang/tr.yaml
# Turkish
# Inherits from: default.yaml
#
# v2.99: Initial Turkish support.
#
# Turkish phonological characteristics:
#   - 8 vowels in front/back × rounded/unrounded pairs (vowel harmony)
#   - Word-final stress in native words; non-final in place names, some
#     suffixes, and loanwords (eSpeak handles this via its G2P)
#   - Syllable-timed rhythm (less stress contrast than English)
#   - Agglutinative morphology — words can be very long
#   - Yumuşak ge (ğ) realized as vowel lengthening or /j/ glide
#   - Near 1:1 orthography-to-pronunciation mapping
#   - Geminate consonants in native and Arabic-origin words
#
# eSpeak-ng's Turkish G2P is high quality.  The main work here is
# normalizing its IPA to our phoneme table and tuning prosody for
# syllable-timed rhythm rather than English stress-timed patterns.

settings:
  # ── Stress timing ──────────────────────────────────────────────
  # Turkish is syllable-timed: stressed and unstressed syllables are
  # closer in duration than in English.  Lower divisors = less contrast.
  primaryStressDiv: 1.15
  secondaryStressDiv: 1.05

  # ── Single-word and clause-final behavior ──────────────────────
  singleWordFinalHoldMs: 15
  clauseFinalFadeMs: 8

  stopClosureAfterNasalsEnabled: true
  stopClosureNasalToStopGapMs: 10
  stopClosureNasalToStopFadeMs: 2

  # ── Core processing passes ─────────────────────────────────────
  coarticulationEnabled: true
  coarticulationVelarPinchEnabled: false
  coarticulationGraduated: false
  coarticulationAdjacencyMaxConsonants: 0
  coarticulationRightSideScale: 0.5
  coarticulationVelarF2LocusFront: 1800
  coarticulationVelarF2LocusBack: 1100

  segmentBoundarySkipVowelToLiquid: false

  highRateThreshold: 2.5
  highRateCoarticulationFloor: 0.35
  highRateBandwidthWideningFactor: 1.3

  trajectoryLimitEnabled: true
  microprosodyEnabled: true

  # ── Phrase-final lengthening ───────────────────────────────────
  # Turkish does phrase-final lengthening but less dramatically than
  # English — syllable timing keeps things more even.
  phraseFinalLengtheningEnabled: true
  phraseFinalLengtheningNucleusOnlyMode: false
  phraseFinalLengtheningFinalSyllableScale: 1.03
  phraseFinalLengtheningNucleusScale: 1.10
  phraseFinalLengtheningNucleusDiphthongScale: 1.03
  phraseFinalLengtheningCodaScale: 1.05
  phraseFinalLengtheningCodaStopScale: 1.0
  phraseFinalLengtheningCodaFricativeScale: 1.05
  phraseFinalLengtheningCodaNasalScale: 1.10
  phraseFinalLengtheningPenultimateSyllableScale: 1.02
  phraseFinalLengtheningStatementScale: 1.0
  phraseFinalLengtheningQuestionScale: 0.90

  # ── Microprosody ───────────────────────────────────────────────
  microprosodyVoicelessF0RaiseEnabled: false
  microprosodyVoicelessF0RaiseHz: 12.0
  microprosodyVoicedF0LowerEnabled: true
  microprosodyVoicedF0LowerHz: 4.0
  microprosodyVoicedFricativeLowerScale: 0.5
  microprosodyFollowingF0Enabled: true
  microprosodyFollowingVoicelessRaiseHz: 3.0
  microprosodyFollowingVoicedLowerHz: 2.0
  microprosodyIntrinsicF0Enabled: true
  microprosodyIntrinsicF0HighThreshold: 400.0
  microprosodyIntrinsicF0LowThreshold: 600.0
  microprosodyIntrinsicF0HighRaiseHz: 3.0
  microprosodyIntrinsicF0LowDropHz: 2.0

  # Turkish voiceless stops are unaspirated — less pre-voiceless
  # shortening than English.
  microprosodyPreVoicelessShortenEnabled: true
  microprosodyPreVoicelessShortenScale: 0.88
  microprosodyPreVoicelessMinMs: 35.0
  microprosodyVoicelessCodaLengthenEnabled: true
  microprosodyVoicelessCodaLengthenScale: 1.10
  microprosodyMaxTotalDeltaHz: 10.0

  rateReductionEnabled: false
  nasalizationAnticipatoryEnabled: false

  # ── Prominence ─────────────────────────────────────────────────
  # Turkish has less dramatic stress contrast than English.  The
  # prominence pass still helps shape duration and pitch, but with
  # gentler weights.
  prominence:
    enabled: true
    primaryStressWeight: 1.25
    secondaryStressWeight: 1.10
    longVowelWeight: 0.0
    longVowelMode: "never"
    wordInitialBoost: 0.0
    wordFinalReduction: 0.0

    durationProminentFloorMs: 50
    durationPrimaryFloorMs: 80
    durationReducedCeiling: 0.90

    monosyllableFloor: 0.85

    # Turkish function words — particles, postpositions, copulas.
    monosyllableExclude:
      - "dɛ"       # de/da (conjunction "and/also")
      - "da"       # da variant
      - "bɪr"      # bir (a/one, unstressed article use)
      - "vɛ"       # ve (and)
      - "jɛ"       # ye (to, dative short form)
      - "mɪ"       # mı/mi (question particle)

    fullVowelFloor: 0.5
    amplitudeBoostDb: 0.2
    amplitudeReductionDb: 0.0
    pitchFromProminence: true

  # ── Liquid dynamics ────────────────────────────────────────────
  liquidDynamics:
    enabled: true
    rhoticF3Dip:
      enabled: false   # Turkish /ɾ/ is a tap, not an approximant

  # ── Diphthong collapse ─────────────────────────────────────────
  # Turkish has very few diphthongs — mostly in loanwords.
  diphthongCollapse:
    enabled: true
    durationFloorMs: 60
    onsetHoldExponent: 1.7
    microFrameIntervalMs: 8

  lengthContrast:
    enabled: false

  # ── Allophone rules ────────────────────────────────────────────
  allophoneRulesEnabled: true
  allophoneRules:
    enabled: true
    rules:
      # Turkish /l/ has clear vs dark allophony based on vowel context.
      # Before/after back vowels (a, ı, o, u): dark [ɫ]
      # Before/after front vowels (e, i, ö, ü): clear [l]
      # eSpeak already outputs ɫ for dark contexts, but reinforce it.
      - name: dark_l_post_vocalic
        phonemes: [l, ɫ]
        position: post-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 950.0
            blend: 0.7
          - field: pf2
            targetHz: 950.0
            blend: 0.7

      - name: light_l_pre_vocalic
        phonemes: [l, ɫ]
        position: pre-vocalic
        action: shift
        fieldShifts:
          - field: cf2
            targetHz: 950.0
            blend: 0.15
          - field: pf2
            targetHz: 950.0
            blend: 0.15

      # Turkish voiceless stops are unaspirated (unlike English).
      # Reduce aspiration on word-initial and intervocalic stops.
      - name: unaspirated_stops
        flags: [stop]
        notFlags: [voiced]
        action: scale
        fieldScales:
          aspirationAmplitude: 0.30
          fricationAmplitude: 0.35

      # Turkish word-final /z/ devoices in utterance-final and
      # pre-pausal position → [z̥].  Reduces voicing, boosts frication
      # slightly.  This is why "sekiz" and "dokuz" end with a quiet
      # hiss rather than a full buzzy /z/.
      - name: word_final_z_devoice
        phonemes: [z, z_tr]
        position: word-final
        action: scale
        fieldScales:
          voiceAmplitude: 0.25
          fricationAmplitude: 1.15

  # ── Boundary smoothing ─────────────────────────────────────────
  # Turkish has clean syllable boundaries — less coarticulatory
  # smearing than English.
  boundarySmoothing:
    enabled: true
    f1Scale: 0.50
    f2Scale: 0.50
    f3Scale: 0.80

    nasalF1Instant: true
    nasalF2F3SpansPhone: true

    liquidToVowelFadeMs: 16
    vowelToLiquidFadeMs: 14
    stopToVowelFadeMs: 16
    vowelToStopFadeMs: 16
    fricToVowelFadeMs: 14
    vowelToFricFadeMs: 14
    nasalToVowelFadeMs: 12
    vowelToNasalFadeMs: 12
    nasalToStopFadeMs: 10
    liquidToStopFadeMs: 10
    fricToStopFadeMs: 8
    stopToFricFadeMs: 10
    vowelToVowelFadeMs: 14

    highRateFadeRatioFloor: 0.40

    labialF1Scale: 0.30
    labialF2Scale: 0.50
    labialF3Scale: 0.50
    alveolarF1Scale: 0.38
    alveolarF2Scale: 0.48
    alveolarF3Scale: 0.60
    palatalF1Scale: 0.33
    palatalF2Scale: 0.50
    palatalF3Scale: 0.70
    velarF1Scale: 0.33
    velarF2Scale: 0.60
    velarF3Scale: 0.55

  # ── Trajectory limiting ────────────────────────────────────────
  trajectoryLimit:
    enabled: true
    applyAcrossWordBoundary: true
    windowMs: 25
    liquidRateScale: 1.5
    applyTo: [cf2, cf3, pf2, pf3]
    maxHzPerMs:
      cf2: 26
      cf3: 22
      pf2: 18
      pf3: 22

  # ── Special coarticulation ─────────────────────────────────────
  specialCoarticulation:
    enabled: true
    maxDeltaHz: 350
    rules:
      - name: labial-f2-lowering
        triggers: ["w", "b", "p", "m"]
        vowelFilter: all
        formant: f2
        deltaHz: -40
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: alveolar-back-vowel-fronting
        triggers: ["t", "d", "n", "s", "z"]
        vowelFilter: back
        formant: f2
        deltaHz: 50
        side: both
        cumulative: false
        unstressedScale: 0.5

      # Turkish palatal consonants (ɟ, c) strongly front adjacent vowels.
      - name: palatal-f2-raising
        triggers: ["ɟ", "c", "j"]
        vowelFilter: all
        formant: f2
        deltaHz: 80
        side: both
        cumulative: false
        unstressedScale: 0.5

      - name: pre-velar-f2-raise
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f2
        deltaHz: 70
        side: right
        cumulative: false
        unstressedScale: 0.7

      - name: pre-velar-f3-lower
        triggers: ["ŋ", "k", "ɡ", "g"]
        vowelFilter: all
        formant: f3
        deltaHz: -90
        side: right
        cumulative: false
        unstressedScale: 0.7

  # ── Cluster timing ─────────────────────────────────────────────
  # Turkish syllable structure is simpler than English — fewer
  # complex clusters.  Keep timing close to 1.0 (distinct).
  clusterTiming:
    enabled: true
    fricBeforeStopScale: 0.80
    stopBeforeFricScale: 0.85
    fricBeforeFricScale: 0.85
    stopBeforeStopScale: 0.75
    tripleClusterMiddleScale: 0.70
    affricateInClusterScale: 0.85
    wordMedialConsonantScale: 0.92
    wordFinalObstruentScale: 0.95

  # ── Cluster blend ──────────────────────────────────────────────
  clusterBlend:
    enabled: true
    forwardDriftStrength: 0.20

  # ── Rate compensation ──────────────────────────────────────────
  rateCompensation:
    enabled: true
    minimumDurations:
      vowelMs: 22
      fricativeMs: 20
      stopMs: 5
      nasalMs: 20
      liquidMs: 16
      affricateMs: 14
      semivowelMs: 30
      tapMs: 4
      trillMs: 14
      voicedConsonantMs: 12
    wordFinalBonusMs: 4
    floorSpeedScale: 0.0
    clusterProportionGuard: true
    clusterMaxRatioShift: 0.4
    schwaReduction:
      enabled: false

  # ── Syllable duration ──────────────────────────────────────────
  syllableDuration:
    enabled: true
    onsetScale: 1.05
    codaScale: 0.90
    unstressedOpenNucleusScale: 0.95

  # ── Syllable structure ─────────────────────────────────────────
  # Turkish allows up to CCC onsets in loanwords (str-, etc.) but
  # native words are simpler (CV, CVC, CVCC at most).
  syllableStructure:
    legalOnsets:
      - pl
      - bl
      - pɾ
      - bɾ
      - tɾ
      - dɾ
      - kɾ
      - ɡɾ
      - fl
      - fɾ
      - sl
      - sm
      - sn
      - sp
      - st
      - sk
      - stɾ
      - spɾ
      - skɾ

  legacyPitchMode: espeak_style
  legacyPitchInflectionScale: 0.56

  thousandsSeparatorCommaToSpace: true

  dictSuffixes:
    - "lar"   # plural (back)
    - "ler"   # plural (front)
    - "dan"   # ablative (back, voiced)
    - "den"   # ablative (front, voiced)
    - "tan"   # ablative (back, voiceless)
    - "ten"   # ablative (front, voiceless)
    - "da"    # locative (back, voiced)
    - "de"    # locative (front, voiced)
    - "ta"    # locative (back, voiceless)
    - "te"    # locative (front, voiceless)
    - "la"    # instrumental (back)
    - "le"    # instrumental (front)
    - "ın"    # genitive (back unrounded)
    - "in"    # genitive (front unrounded)
    - "un"    # genitive (back rounded)
    - "ün"    # genitive (front rounded)
    - "ı"     # accusative (back unrounded)
    - "i"     # accusative (front unrounded)
    - "u"     # accusative (back rounded)
    - "ü"     # accusative (front rounded)
    - "a"     # dative (back)
    - "e"     # dative (front)

normalization:
  preReplacements:
    # ── Long vowels FIRST (before short vowel rules catch them) ──
    # These carry ğ (yumuşak ge) compensation length in common words.
    - from: "aː"
      to:   "aː_tr"
    - from: "œː"
      to:   "œː_tr"
    - from: "oː"
      to:   "oː_tr"
    - from: "øː"
      to:   "øː_tr"
    - from: "ʊː"
      to:   "ʊː_tr"

    # ── Core 8 Turkish vowels ──────────────────────────────────
    - from: "a"
      to:   "a_tr"
    - from: "e"
      to:   "e_tr"
    - from: "i"
      to:   "i_tr"
    - from: "o"
      to:   "o_tr"
    - from: "u"
      to:   "u_tr"
    - from: "y"
      to:   "y_tr"
    - from: "ø"
      to:   "ø_tr"
    - from: "ɯ"
      to:   "ɯ_tr"

    # ── Allophones eSpeak produces ─────────────────────────────
    - from: "ɛ"
      to:   "ɛ_tr"
    - from: "æ"
      to:   "æ_tr"
    - from: "ɪ"
      to:   "ɪ_tr"
    - from: "ɔ"
      to:   "ɔ_tr"
    - from: "œ"
      to:   "œ_tr"
    - from: "ʊ"
      to:   "ʊ_tr"

    # ── Rare long vowel normalization (map to short _tr) ───────
    - from: "ɛː"
      to:   "ɛ_tr"
    - from: "ɯː"
      to:   "ɯ_tr"
    - from: "ɪː"
      to:   "ɪ_tr"

    # ── Geminate consonant normalization ────────────────────────
    # eSpeak sometimes uses ː on consonants for geminates (dː, kː).
    # Our engine handles geminates as repeated phonemes, not length
    # marks.  Normalize Cː → CC so the greedy matcher finds them.
    # MUST come BEFORE single-consonant _tr routing below, otherwise
    # s→s_tr would match the 's' inside 'sː' producing 's_trː'.
    - from: "dː"
      to:   "dd"
    - from: "tː"
      to:   "tt"
    - from: "kː"
      to:   "kk"
    - from: "sː"
      to:   "ss"
    - from: "lː"
      to:   "ll"
    - from: "nː"
      to:   "nn"
    - from: "mː"
      to:   "mm"
    - from: "ɾː"
      to:   "ɾɾ"

    # ── Turkish dental sibilants ────────────────────────────────
    # Turkish /s/ and /z/ are dental laminal [s̪, z̪] — tongue blade
    # against upper teeth.  Spectral peak ~500-800 Hz higher than
    # English alveolar /s, z/.
    - from: "s"
      to:   "s_tr"
    - from: "z"
      to:   "z_tr"

  classes:
    # Not needed for Turkish currently, but defined for future
    # conditional normalization rules.
    VOWELISH:
      - a
      - e
      - i
      - o
      - u
      - y
      - ø
      - œ
      - ɛ
      - ɪ
      - ɔ
      - ʊ
      - ɯ
      - æ
      - ə

    CONSONANTS:
      - b
      - c
      - d
      - "d͡ʒ"
      - f
      - h
      - j
      - k
      - l
      - m
      - n
      - p
      - s
      - t
      - "t͡ʃ"
      - v
      - z
      - ɟ
      - ɡ
      - ɣ
      - ɫ
      - ɾ
      - ʃ
      - ʒ

  replacements: []
