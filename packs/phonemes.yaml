    # Word-final tap for Spanish (issue #53). Before silence the tap
    # needs a clear alveolar release burst — without it the held closure
    # sounds nasal (/n/) or lateral (/l/).
    # Tuning based on Quilis (1993), Blecua (2001): word-final tap
    # F1 ~400-450 Hz, F2 at alveolar locus ~1400-1600 Hz.
    # cf1 420: above lateral (310) and nasal (250) territory.
    # cf2 1550: alveolar locus, avoids palatal/glide quality (was 1720).
    # fricationAmplitude 0.18: audible release burst before silence
    # (base tap is 0.25; previous 0.05 was nearly inaudible).
    # pa rebalanced to mid-frequency alveolar profile (was pa6-only).
    # voiceAmplitude 0.55: low voicing so frication burst dominates the
    # release — high voicing (0.95) caused the tap recovery phase to
    # sound lateral when held by singleWordFinalHold before silence.
    # May need DSP/frontend-level fix long-term (issue #53).
    _isLiquid: false
