  "ä":
    # GenAm MOUTH diphthong onset — open central [a].
    # F1=730 (open, Hillenbrand male MOUTH=768), F2=1450 (central).
    # History: F2=1430+F1=680 was schwa-like → "ertside".  F2=1300+F1=780
    # was only 30 Hz from ɑ (1330) → "sauna".  F2=1450 with F1=730 is
    # 120 Hz from ɑ and 230 Hz F1-gap from schwa — distinct from both.
    # Gives 580 Hz F2 sweep to ʊ (870) for a wide, satisfying glide.
    # Bandwidths: Hillenbrand 1995 Table III open vowels B1=150-170,
    # B2=100-120.  Old eSpeak-inherited B1=116/B2=76 was too narrow,
    # producing sharp resonance peaks that clipped on mobile speakers.
    _isVowel: true
    _isVoiced: true
    aspirationAmplitude: 0
    caNP: 0
    cb1: 170
    cb2: 120
    cb3: 170
    cb4: 250
    cb5: 200
    cb6: 1000
    cbN0: 100
