  "å":
    # RP MOUTH diphthong onset — open back-of-central [a̠].
    # Hawkins & Midgley (2005, JIPA 35/2): modern RP MOUTH onset
    # F1≈770 Hz, F2≈1200-1300 Hz — distinctly backer than PRICE.
    # Deterding (1997, JIPA 27): RP MOUTH onset F1≈750, F2≈1200.
    # Cruttenden (2014, Gimson's 8th ed.): RP MOUTH [a]~[ɑ], open.
    # Target: F1=780 (open), F2=1650 (fronted — palatal quality),
    # F3=2100 (low for lip rounding cue).  eSpeak produces identical
    # /aʊ/ for both en-gb and en — no MOUTH distinction at all.
    # F2=1650 compensates: 200 Hz above GenAm ä (1450), giving RP its
    # characteristic fronted-but-rounded onset quality.  Wide cb1
    # prevents the open F1 from clipping.
