# TGSpeechBox native Speech Dispatcher module configuration.
# This file is read by sd_tgsb at startup (passed as argv[1] by Speech Dispatcher).
#
# All settings are optional — sd_tgsb auto-detects sensible defaults.

# Path to TGSpeechBox pack directory (auto-detected if not set)
# TGSBPackDir "/usr/local/share/tgspeechbox"

# Output sample rate in Hz (default: 22050)
# TGSBSampleRate 22050

# Default voice (default: Adam)
# TGSBDefaultVoice "Adam"

# Default language (default: en-us, overridden by SET LANGUAGE from SD)
# TGSBDefaultLanguage "en-us"
