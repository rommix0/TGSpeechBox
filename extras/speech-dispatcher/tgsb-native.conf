# TGSpeechBox native Speech Dispatcher module configuration.
#
# System config:   /etc/speech-dispatcher/modules/tgsb-native.conf
# Per-user config: ~/.config/tgspeechbox/sd_tgsb.conf (wins over system)
#
# Uncomment and change any line to override the default.
# After editing: killall speech-dispatcher

# ── Basic settings ─────────────────────────────────────────────────────

# Output sample rate in Hz (default: 22050)
# TGSBSampleRate 22050

# Default voice: Adam, Benjamin, Caleb, David, Robert,
#                or a YAML profile name (Beth, Bobby, etc.)
# TGSBDefaultVoice Adam

# Default language (overridden by Orca/SD per-utterance)
# TGSBDefaultLanguage en-us

# Path to pack directory (auto-detected if not set)
# TGSBPackDir /usr/local/share/tgspeechbox

# ── Pitch and prosody ──────────────────────────────────────────────────

# Pitch mode: espeak_style, fujisaki_style, impulse_style, klatt_style
# TGSBPitchMode espeak_style

# Inflection range (0.0 = monotone, 0.5 = normal, 1.0 = expressive)
# TGSBInflection 0.5

# Pause between clauses: off, short, long
# TGSBPauseMode off

# ── Voicing tone (0-100 sliders, 50 = neutral) ────────────────────────
#
# Same parameters as the NVDA and SAPI settings panels.

# TGSBVoicingPeakPos 50
# TGSBVoicedPreEmphA 50
# TGSBVoicedPreEmphMix 50
# TGSBHighShelfGain 50
# TGSBHighShelfFc 50
# TGSBHighShelfQ 50
# TGSBVoicedTilt 50
# TGSBNoiseGlottalMod 0
# TGSBPitchSyncF1 50
# TGSBPitchSyncB1 50
# TGSBSpeedQuotient 50
# TGSBAspirationTilt 50
# TGSBCascadeBwScale 50
# TGSBTremor 0
# TGSBChorusDepth 0
# TGSBChorusDetune 33

# ── Voice quality (0-100 sliders) ─────────────────────────────────────

# TGSBCreakiness 0
# TGSBBreathiness 0
# TGSBJitter 0
# TGSBShimmer 0
# TGSBSharpness 50
