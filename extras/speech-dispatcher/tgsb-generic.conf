# Voices
#
# Speech Dispatcher passes $VOICE to tgsbRender's --voice parameter.
# Voice profiles work across all languages — tgsbRender falls back to
# "default" if a profile isn't found for the current language pack.
#
# sd_generic requires one AddVoice per language×voice combination.
# The macro-style repetition below ensures every voice is available
# for every language Orca can request.
#
# Built-in voices: Adam (default), Benjamin, David, Robert, Caleb
# YAML profiles (Beth, Bobby) omitted — not ready for primary use yet.

AddVoice "bg" "MALE1" "Adam"
